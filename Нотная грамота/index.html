            { key: 'Ми-бемоль мажор', signs: 3, signType: 'flat', keyEn: 'Eb major' },
            { key: 'Ля-бемоль мажор', signs: 4, signType: 'flat', keyEn: 'Ab major' },
            { key: 'Ля минор', signs: 0, signType: 'none', keyEn: 'A minor' },
            { key: 'Ми минор', signs: 1, signType: 'sharp', keyEn: 'E minor' },
            { key: 'Си минор', signs: 2, signType: 'sharp', keyEn: 'B minor' },
            { key: 'Фа-диез минор', signs: 3, signType: 'sharp', keyEn: 'F# minor' },
            { key: 'До-диез минор', signs: 4, signType: 'sharp', keyEn: 'C# minor' },
            { key: 'Ре минор', signs: 1, signType: 'flat', keyEn: 'D minor' },
            { key: 'Соль минор', signs: 2, signType: 'flat', keyEn: 'G minor' },
            { key: 'До минор', signs: 3, signType: 'flat', keyEn: 'C minor' },
            { key: 'Фа минор', signs: 4, signType: 'flat', keyEn: 'F minor' }
        ];
        const KEYS_BY_CLASS = {
            '1-2': ['До мажор', 'Соль мажор', 'Фа мажор', 'Ля минор'],
            '3-4': ['До мажор', 'Соль мажор', 'Ре мажор', 'Фа мажор', 'Си-бемоль мажор', 'Ля минор', 'Ми минор', 'Ре минор', 'Соль минор'],
            '5-6': ['До мажор', 'Соль мажор', 'Ре мажор', 'Ля мажор', 'Фа мажор', 'Си-бемоль мажор', 'Ми-бемоль мажор', 'Ля минор', 'Ми минор', 'Си минор', 'Ре минор', 'Соль минор', 'До минор'],
            '7-8': KEY_SIGNATURES.map(k => k.key)
        };

        // ── State ────────────────────────────────────────────────
        let postrType = 'intervals';
        let postrClass = '1-2';
        let postrCurrentEx = null;
        let postrUserAnswer = []; // array of {note, octave} for piano exercises; string for keys
        let postrChecked = false;
        let postrHintShown = false;

        // ── Helpers ──────────────────────────────────────────────
        function addSemitones(note, octave, semitones) {
            const idx = NOTES.indexOf(note);
            const abs = octave * 12 + idx + semitones;
            return { note: NOTES[((abs % 12) + 12) % 12], octave: Math.floor(abs / 12) };
        }

        function buildScaleNotes(tonic, octave, patternName) {
            const pattern = SCALE_PATTERNS[patternName];
            const result = [{ note: tonic, octave }];
            let cur = { note: tonic, octave };
            for (const step of pattern) {
                cur = addSemitones(cur.note, cur.octave, step);
                result.push({ note: cur.note, octave: cur.octave });
            }
            return result;
        }

        function noteLabel(note, octave) {
            const t = TRANSLATIONS[lang];
            return (t.notesLong[note] || note) + ' ' + (t.octavesLong[octave] || octave);
        }

        function intervalLabel(name) {
            return lang === 'en' ? (INTERVAL_EN[name] || name) : name;
        }
        function chordLabel(name) {
            return lang === 'en' ? (CHORD_EN[name] || name) : name;
        }
        function scaleLabel(name) {
            return lang === 'en' ? (SCALE_EN[name] || name) : name;
        }
        function keyLabel(ks) {
            return lang === 'en' ? ks.keyEn : ks.key;
        }

        function randFrom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function pickRootNote() {
            const natural = NOTES.filter(n => !n.includes('#'));
            return { note: randFrom(natural), octave: 4 };
        }

        // ── Exercise generators ──────────────────────────────────
        function generateIntervalEx() {
            const intervalList = INTERVALS_BY_CLASS[postrClass];
            const intervalName = randFrom(intervalList);
            const { note, octave } = pickRootNote();
            const semitones = INTERVAL_SEMITONES[intervalName];
            const target = addSemitones(note, octave, semitones);
            return { kind: 'interval', rootNote: note, rootOctave: octave, intervalName, target, semitones };
        }

        function generateChordEx() {
            const chordList = CHORDS_BY_CLASS[postrClass];
            const chordName = randFrom(chordList);
            const { note, octave } = pickRootNote();
            const intervals = CHORD_INTERVALS[chordName];
            const targets = intervals.map(s => addSemitones(note, octave, s));
            return { kind: 'chord', rootNote: note, rootOctave: octave, chordName, targets, intervals };
        }

        function generateScaleEx() {
            const { patterns, tonics } = SCALES_BY_CLASS[postrClass];
            const patternName = randFrom(patterns);
            const tonicNote = randFrom(tonics);
            const scaleNotes = buildScaleNotes(tonicNote, 4, patternName);
            return { kind: 'scale', tonicNote, patternName, scaleNotes };
        }

        function generateKeysEx() {
            const keyList = KEYS_BY_CLASS[postrClass];
            const keyName = randFrom(keyList);
            const ks = KEY_SIGNATURES.find(k => k.key === keyName);
            // Generate 4 multiple-choice options
            const pool = KEY_SIGNATURES.filter(k => keyList.includes(k.key) && k.key !== keyName);
            const shuffled = pool.sort(() => Math.random() - 0.5).slice(0, 3);
            const options = [...shuffled, ks].sort(() => Math.random() - 0.5);
            return { kind: 'keys', ks, options };
        }

        function generateExercise() {
            postrChecked = false;
            postrHintShown = false;
            postrUserAnswer = [];
            if (postrType === 'intervals') postrCurrentEx = generateIntervalEx();
            else if (postrType === 'chords') postrCurrentEx = generateChordEx();
            else if (postrType === 'scales') postrCurrentEx = generateScaleEx();
            else postrCurrentEx = generateKeysEx();
            // Pre-fill root/tonic so it counts toward the answer
            if (postrCurrentEx.kind === 'chord') {
                postrUserAnswer = [{ note: postrCurrentEx.rootNote, octave: postrCurrentEx.rootOctave }];
            } else if (postrCurrentEx.kind === 'scale') {
                postrUserAnswer = [{ note: postrCurrentEx.tonicNote, octave: 4 }];
            } else if (postrCurrentEx.kind === 'keys') {
                postrUserAnswer = '';
            }
            renderPostrExercise();
        }

        // ── Mini piano renderer ──────────────────────────────────
        // givenNotes: [{note, octave}], selectedNotes: [{note, octave}], correctNotes: [{note, octave}]|null
        function buildMiniPiano(givenNotes, selectedNotes, correctNotes, octaveRange) {
            const whites = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
            const blackOffsets = { 'C#': 1, 'D#': 2, 'F#': 4, 'G#': 5, 'A#': 6 };
            const ww = 36; // white key width
            const bw = 22; // black key width

            function classFor(note, octave, type) {
                const isGiven = givenNotes.some(n => n.note === note && n.octave === octave);
                if (isGiven) return type + ' given';
                if (correctNotes) {
                    const isCorrect = correctNotes.some(n => n.note === note && n.octave === octave);
                    const isSelected = selectedNotes.some(n => n.note === note && n.octave === octave);
                    if (isSelected && isCorrect) return type + ' correct-hl';
                    if (isSelected && !isCorrect) return type + ' wrong-hl';
                    if (!isSelected && isCorrect) return type + ' correct-hl'; // show missed
                    return type;
                }
                const isSelected = selectedNotes.some(n => n.note === note && n.octave === octave);
                return type + (isSelected ? ' selected' : '');
            }

            let html = '<div class="postr-piano-wrap"><div class="postr-piano">';
            for (const oct of octaveRange) {
                html += `<div class="postr-octave" style="width:${ww*7}px;">`;
                // White keys
                whites.forEach(n => {
                    const cls = classFor(n, oct, 'postr-white');
                    const lbl = TRANSLATIONS[lang].notes[n] || n;
                    const cb = (!postrChecked) ? `onclick="postrPianoClick('${n}',${oct})"` : '';
                    html += `<div class="${cls}" ${cb}>${lbl}</div>`;
                });
                // Black keys
                Object.entries(blackOffsets).forEach(([n, pos]) => {
                    const left = (pos - 1) * ww + (ww * 0.7);
                    const cls = classFor(n, oct, 'postr-black');
                    const lbl = TRANSLATIONS[lang].notes[n] || n;
                    const cb = (!postrChecked) ? `onclick="postrPianoClick('${n}',${oct})"` : '';
                    html += `<div class="${cls}" style="left:${left}px;top:0;" ${cb}>${lbl}</div>`;
                });
                html += '</div>';
            }
            html += '</div></div>';
            return html;
        }

        // ── Piano click handler ──────────────────────────────────
        function postrPianoClick(note, octave) {
            if (postrChecked) return;
            const ex = postrCurrentEx;
            if (ex.kind === 'interval') {
                postrUserAnswer = [{ note, octave }];
            }
            else if (ex.kind === 'chord') {
                // Root is pre-filled and locked
                if (note === ex.rootNote && octave === ex.rootOctave) { playFrequency(note, octave, 0.5); return; }
                const idx = postrUserAnswer.findIndex(n => n.note === note && n.octave === octave);
                if (idx >= 0) postrUserAnswer.splice(idx, 1);
                else if (postrUserAnswer.length < ex.targets.length) postrUserAnswer.push({ note, octave });
            }
            else if (ex.kind === 'scale') {
                // Tonic is pre-filled and locked
                if (note === ex.tonicNote && octave === 4) { playFrequency(note, octave, 0.5); return; }
                const idx = postrUserAnswer.findIndex(n => n.note === note && n.octave === octave);
                if (idx >= 0) postrUserAnswer.splice(idx, 1);
                else if (postrUserAnswer.length < ex.scaleNotes.length) postrUserAnswer.push({ note, octave });
            }
            playFrequency(note, octave, 0.5);
            renderPostrExercise();
        }

        // ── Check logic ──────────────────────────────────────────
        function postrCheckAnswer() {
            if (postrChecked) return;
            const ex = postrCurrentEx;
            let correct = false;

            if (ex.kind === 'interval') {
                correct = postrUserAnswer.length === 1 &&
                    postrUserAnswer[0].note === ex.target.note &&
                    postrUserAnswer[0].octave === ex.target.octave;
            } else if (ex.kind === 'chord') {
                correct = postrUserAnswer.length === ex.targets.length &&
                    ex.targets.every(tc => postrUserAnswer.some(a => a.note === tc.note && a.octave === tc.octave));
            } else if (ex.kind === 'scale') {
                // Order-independent: all correct notes must be selected
                correct = postrUserAnswer.length === ex.scaleNotes.length &&
                    ex.scaleNotes.every(tc => postrUserAnswer.some(a => a.note === tc.note && a.octave === tc.octave));
            } else if (ex.kind === 'keys') {
                const _sk = KEY_SIGNATURES.find(k => k.key === postrUserAnswer);
                correct = _sk && _sk.signs === ex.ks.signs && _sk.signType === ex.ks.signType;
            }

            postrChecked = true;
            renderPostrExercise(correct);
            if (correct) {
                setTimeout(() => generateExercise(), 1000);
            } else {
                // Wrong — reset after 1.5s so student tries same exercise again
                setTimeout(() => {
                    postrChecked = false;
                    if (ex.kind === 'chord') postrUserAnswer = [{ note: ex.rootNote, octave: ex.rootOctave }];
                    else if (ex.kind === 'scale') postrUserAnswer = [{ note: ex.tonicNote, octave: 4 }];
                    else if (ex.kind === 'keys') postrUserAnswer = '';
                    else postrUserAnswer = [];
                    renderPostrExercise();
                }, 1500);
            }
        }

        // ── Key sig option click ─────────────────────────────────
        function postrSelectOption(keyName) {
            if (postrChecked) return;
            postrUserAnswer = keyName;
            renderPostrExercise();
        }

        // ── Key signature SVG ────────────────────────────────────
        function buildKeySignatureSVG(signs, signType) {
            const sp    = 10;
            const sTop  = 24;
            const clefW = 50;
            const signW = 16;
            const w     = clefW + Math.max(signs, 0) * signW + 10;
            const h     = sTop + sp * 4 + 22;
            const sc    = isDark ? '#94a3b8' : '#64748b';
            const nc    = isDark ? '#e2e8f0' : '#1e293b';

            let svg = `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" style="display:inline-block;vertical-align:middle">`;

            for (let i = 0; i < 5; i++) {
                svg += `<line x1="4" y1="${sTop+i*sp}" x2="${w-4}" y2="${sTop+i*sp}" stroke="${sc}" stroke-width="1.5"/>`;
            }

            // Treble clef: baseline 2 px above bottom staff line (matches main composer staff)
            const clefY = sTop + sp * 4 - 2;
            svg += '<text x="5" y="' + clefY + '" font-size="58" fill="' + nc + '" font-family="serif">𝄞</text>';

            if (signs > 0 && signType !== 'none') {
                // Standard treble-clef positions (offset × sp from sTop)
                // Sharps: F     C      G       D     A      E     B
                const sharpOff = [0.0, 1.5, -0.5,  1.0,  2.5,  0.5,  2.0];
                // Flats:  B     E      A      D     G      C     F
                const flatOff  = [2.0, 0.5,  2.5,  1.0,  3.0,  1.5,  3.5];
                const offsets  = signType === 'sharp' ? sharpOff : flatOff;

                for (let i = 0; i < signs; i++) {
                    const cx = clefW + i * signW;
                    const cy = sTop + offsets[i] * sp;

                    if (signType === 'sharp') {
                        // Two vertical lines
                        svg += `<line x1="${cx+2}"  y1="${cy-7}"  x2="${cx+2}"  y2="${cy+7}"  stroke="${nc}" stroke-width="1.5"/>`;
                        svg += `<line x1="${cx+8}"  y1="${cy-9}"  x2="${cx+8}"  y2="${cy+5}"  stroke="${nc}" stroke-width="1.5"/>`;
                        // Two slightly tilted horizontal bars
                        svg += `<line x1="${cx-1}"  y1="${cy-2}"  x2="${cx+11}" y2="${cy-4}"  stroke="${nc}" stroke-width="2.2"/>`;
                        svg += `<line x1="${cx-1}"  y1="${cy+3}"  x2="${cx+11}" y2="${cy+1}"  stroke="${nc}" stroke-width="2.2"/>`;
                    } else {
                        // Flat: vertical stem + teardrop belly (note center at cy)
                        svg += `<line x1="${cx}" y1="${cy-12}" x2="${cx}" y2="${cy+5}" stroke="${nc}" stroke-width="1.5"/>`;
                        svg += `<path d="M${cx},${cy-4} C${cx+12},${cy-5} ${cx+12},${cy+5} ${cx},${cy+5} Z" fill="${nc}"/>`;
                    }
                }
            }

            svg += '</svg>';
            return svg;
        }

        // ── Main render ──────────────────────────────────────────
        function renderPostrExercise(checkResult) {
            const area = document.getElementById('postrExerciseArea');
            if (!area || !postrCurrentEx) return;
            const t = TRANSLATIONS[lang];
            const ex = postrCurrentEx;
            let html = '';

            // ── Task card ──
            html += '<div class="postr-task-card">';
            if (ex.kind === 'interval') {
                html += `<div class="postr-task-label">${t.buildInterval}:</div>`;
                html += `<div class="postr-task-main">${noteLabel(ex.rootNote, ex.rootOctave)}</div>`;
                html += `<div class="postr-task-sub">${intervalLabel(ex.intervalName)}</div>`;
            } else if (ex.kind === 'chord') {
                html += `<div class="postr-task-label">${t.buildChord}:</div>`;
                html += `<div class="postr-task-main">${noteLabel(ex.rootNote, ex.rootOctave)}</div>`;
                html += `<div class="postr-task-sub">${chordLabel(ex.chordName)}</div>`;
            } else if (ex.kind === 'scale') {
                html += `<div class="postr-task-label">${t.buildScale}:</div>`;
                { const _fn=getScaleFlatNotes(ex.tonicNote,ex.patternName),_od=TRANSLATIONS[lang].octavesLong[4]||"";
                  html += `<div class="postr-task-main">${displayScaleNote(ex.tonicNote,_fn)} ${_od}</div>`; }
                html += `<div class="postr-task-sub">${scaleLabel(ex.patternName)}</div>`;
            } else if (ex.kind === 'keys') {
                html += `<div class="postr-task-label">${t.identifyKey}</div>`;
                html += `<div style="display:flex;justify-content:center;margin:10px 0 4px">`;
                html += buildKeySignatureSVG(ex.ks.signs, ex.ks.signType);
                html += '</div>';
            }
            html += '</div>';

            // ── Hint box ──
            if (postrHintShown && !postrChecked) {
                html += '<div class="postr-hint-box show">';
                html += `<b>${t.hintAnswer}</b> `;
                if (ex.kind === 'interval') {
                    html += noteLabel(ex.target.note, ex.target.octave);
                } else if (ex.kind === 'chord') {
                    html += ex.targets.map(n => noteLabel(n.note, n.octave)).join(', ');
                } else if (ex.kind === 'scale') {
                    { const _fn=getScaleFlatNotes(ex.tonicNote,ex.patternName);
                      html += ex.scaleNotes.map(n=>displayScaleNote(n.note,_fn)).join(' – '); }
                } else if (ex.kind === 'keys') {
                    html += keyLabel(ex.ks);
                }
                html += '</div>';
            }

            // ── Result box ──
            if (postrChecked) {
                const ok = checkResult !== undefined ? checkResult :
                    (() => {
                        if (ex.kind === 'interval') return postrUserAnswer.length === 1 && postrUserAnswer[0].note === ex.target.note && postrUserAnswer[0].octave === ex.target.octave;
                        if (ex.kind === 'chord') return postrUserAnswer.length === ex.targets.length && ex.targets.every(tc => postrUserAnswer.some(a => a.note === tc.note && a.octave === tc.octave));
                        if (ex.kind === 'scale') return postrUserAnswer.length === ex.scaleNotes.length && ex.scaleNotes.every(tc => postrUserAnswer.some(a => a.note === tc.note && a.octave === tc.octave));
                        if (ex.kind === 'keys') { const _sk=KEY_SIGNATURES.find(k=>k.key===postrUserAnswer); return _sk && _sk.signs===ex.ks.signs && _sk.signType===ex.ks.signType; }
                        return false;
                    })();
                html += `<div class="postr-result-box show ${ok ? 'success' : 'error'}">${ok ? t.correct : t.wrong}</div>`;
            }

            // ── Answer area ──
            if (ex.kind !== 'keys') {
                // Piano-based answer
                const givenNotes = ex.kind === 'interval' || ex.kind === 'chord' ? [{ note: ex.rootNote, octave: ex.rootOctave }]
                    : ex.kind === 'scale' ? [{ note: ex.tonicNote, octave: 4 }] : [];
                const correctNotes = postrChecked
                    ? (ex.kind === 'interval' ? [ex.target] : ex.kind === 'chord' ? ex.targets : ex.scaleNotes)
                    : (postrHintShown ? (ex.kind === 'interval' ? [ex.target] : ex.kind === 'chord' ? ex.targets : ex.scaleNotes) : null);

                // Show answer chips
                html += '<div class="postr-answer-display">';
                if (postrUserAnswer.length === 0) {
                    html += `<span class="postr-answer-placeholder">${t.selectNote}</span>`;
                } else {
                    postrUserAnswer.forEach(a => {
                        let cls = 'postr-answer-chip';
                        if (postrChecked) {
                            const isCorr = (ex.kind === 'interval' ? [ex.target] : ex.kind === 'chord' ? ex.targets : ex.scaleNotes)
                                .some(c => c.note === a.note && c.octave === a.octave);
                            cls += isCorr ? ' correct' : ' wrong';
                        }
                        html += `<div class="${cls}">${t.notesLong[a.note] || a.note}</div>`;
                    });
                }
                html += '</div>';

                // Piano
                const octaveRange = ex.kind === 'scale' ? [4, 5] : [4, 5];
                html += buildMiniPiano(givenNotes, postrUserAnswer, postrChecked || postrHintShown ? correctNotes : null, octaveRange);

            } else {
                // Key signatures: multiple choice
                html += '<div class="postr-keysig-options">';
                ex.options.forEach(opt => {
                    let cls = 'postr-keysig-opt';
                    const optKey = opt.key;
                    const isSelected = postrUserAnswer === optKey;
                    if (postrChecked) {
                        if (opt.signs === ex.ks.signs && opt.signType === ex.ks.signType) cls += ' correct';
                        else if (isSelected) cls += ' wrong';
                    } else if (isSelected) {
                        cls += ' selected';
                    }
                    const cb = (!postrChecked) ? `onclick="postrSelectOption('${optKey.replace(/'/g, "\\'")}')"` : '';
                    html += `<button class="${cls}" ${cb}>${keyLabel(opt)}</button>`;
                });
                html += '</div>';
            }

            // ── Actions ──
            html += '<div class="postr-actions">';
            if (!postrChecked) {
                html += `<button class="action-btn secondary" onclick="postrShowHint()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                    ${t.hint}
                </button>`;
                const canCheck = ex.kind === 'keys'  ? (typeof postrUserAnswer === 'string' && postrUserAnswer !== '')
                    : ex.kind === 'chord' ? (postrUserAnswer.length === ex.targets.length)
                    : ex.kind === 'scale' ? (postrUserAnswer.length === ex.scaleNotes.length)
                    : (postrUserAnswer.length > 0);
                html += `<button class="action-btn primary" onclick="postrCheckAnswer()" ${canCheck ? '' : 'disabled'}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                    ${t.check}
                </button>`;
            }
            html += `<button class="action-btn dark" onclick="generateExercise()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
                    <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
                </svg>
                ${t.newEx}
            </button>`;
            if (!postrChecked && (ex.kind==='interval'?postrUserAnswer.length>0:ex.kind==='keys'?(postrUserAnswer!==''):postrUserAnswer.length>1)) {
                html += `<button class="action-btn secondary" onclick="postrUndo()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/>
                    </svg>
                    ${t.undo}
                </button>`;
            }
            const hasClearable = ex.kind === 'chord' ? postrUserAnswer.length > 1
                : ex.kind === 'scale' ? postrUserAnswer.length > 1
                : ex.kind === 'keys' ? (typeof postrUserAnswer === 'string' && postrUserAnswer !== '')
                : postrUserAnswer.length > 0;
            if (!postrChecked && hasClearable) {
                html += `<button class="action-btn danger" onclick="postrClearAnswer()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
                    </svg>
                    ${t.clear}
                </button>`;
            }
            html += '</div>';

            area.innerHTML = html;
        }

        function postrUndo() {
            if (!postrCurrentEx || postrChecked) return;
            const ex = postrCurrentEx;
            if (ex.kind==='chord' && postrUserAnswer.length>1) postrUserAnswer.pop();
            else if (ex.kind==='scale' && postrUserAnswer.length>1) postrUserAnswer.pop();
            else if (ex.kind==='interval') postrUserAnswer=[];
            else if (ex.kind==='keys') postrUserAnswer='';
            renderPostrExercise();
        }

        function postrShowHint() {
            postrHintShown = true;
            renderPostrExercise();
        }

        function postrClearAnswer() {
            const ex = postrCurrentEx;
            if (ex.kind === 'chord') postrUserAnswer = [{ note: ex.rootNote, octave: ex.rootOctave }];
            else if (ex.kind === 'scale') postrUserAnswer = [{ note: ex.tonicNote, octave: 4 }];
            else if (ex.kind === 'keys') postrUserAnswer = '';
            else postrUserAnswer = [];
            renderPostrExercise();
        }

        function initPostrTab() {
            document.querySelectorAll('.postr-sub-tab').forEach(btn => {
                btn.addEventListener('click', () => {
                    postrType = btn.dataset.postr;
                    document.querySelectorAll('.postr-sub-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    generateExercise();
                });
            });
            document.querySelectorAll('.postr-class-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    postrClass = btn.dataset.class;
                    document.querySelectorAll('.postr-class-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    generateExercise();
                });
            });
            generateExercise();
        }
    </script>
</body>
</html>
