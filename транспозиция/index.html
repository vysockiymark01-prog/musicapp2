<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Транспозиция</title>
<style>
:root{--bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#94a3b8;--border:#e2e8f0;
  --sl100:#f1f5f9;--sl200:#e2e8f0;--blue:#2563eb;--blue2:#1d4ed8;
  --green:#16a34a;--red:#dc2626;--shadow:0 1px 4px rgba(0,0,0,.07);}
[data-theme="dark"]{--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--muted:#64748b;
  --border:#334155;--sl100:#334155;--sl200:#475569;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);transition:background .3s,color .3s;}
.wrap{max-width:720px;margin:0 auto;padding:12px 14px;}
.hdr{display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;background:var(--card);border:1px solid var(--border);
  border-radius:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.hdr-title{font-weight:900;font-size:15px;}
.hdr-sub{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;}
.hdr-btns{display:flex;gap:6px;}
.hbtn{padding:6px 11px;background:var(--sl100);border:none;border-radius:10px;
  font-size:10px;font-weight:800;text-transform:uppercase;cursor:pointer;
  color:var(--text);display:flex;align-items:center;gap:5px;}
.hbtn:hover{background:var(--sl200);}
.tabs{display:flex;gap:6px;margin-bottom:12px;background:var(--card);
  padding:6px;border-radius:14px;border:1px solid var(--border);}
.tab{flex:1;padding:8px;border:none;border-radius:10px;font-size:11px;font-weight:800;
  cursor:pointer;background:none;color:var(--muted);transition:all .15s;}
.tab.active{background:var(--blue);color:#fff;}
.panel{display:none;background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:22px;box-shadow:var(--shadow);}
.panel.show{display:block;}
.label{font-size:10px;font-weight:900;text-transform:uppercase;color:var(--muted);
  margin-bottom:6px;}
.sel{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:12px;
  background:var(--sl100);color:var(--text);font-size:13px;font-weight:700;
  outline:none;cursor:pointer;}
.sel:focus{border-color:var(--blue);}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
@media(max-width:480px){.row{grid-template-columns:1fr;}}
.result-box{background:var(--sl100);border-radius:14px;padding:18px;text-align:center;
  margin:16px 0;}
.result-note{font-size:48px;font-weight:900;color:var(--blue);line-height:1;}
.result-label{font-size:12px;color:var(--muted);font-weight:700;margin-top:6px;}
.btn{width:100%;padding:12px;background:var(--blue);border:none;border-radius:12px;
  color:#fff;font-size:13px;font-weight:900;cursor:pointer;margin-top:8px;}
.btn:hover{background:var(--blue2);}
.btn.sec{background:var(--sl100);color:var(--text);}
.btn.sec:hover{background:var(--sl200);}
.scale-row{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0;}
.sc{padding:7px 11px;background:var(--sl100);border-radius:10px;font-size:13px;
  font-weight:800;transition:background .15s;}
.sc.root{background:var(--blue);color:#fff;}
.sc.hi{background:#dcfce7;color:#166534;}
[data-theme="dark"] .sc.hi{background:#166534;color:#bbf7d0;}
.arrow{text-align:center;font-size:24px;margin:8px 0;color:var(--muted);}
.quiz-q{font-size:16px;font-weight:800;margin-bottom:16px;line-height:1.5;
  padding:16px;background:var(--sl100);border-radius:14px;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.qc{padding:12px;border:2px solid var(--border);border-radius:12px;background:var(--card);
  font-size:14px;font-weight:800;cursor:pointer;text-align:center;
  transition:all .15s;color:var(--text);}
.qc:hover:not(:disabled){border-color:var(--blue);}
.qc.correct{background:#dcfce7;border-color:var(--green);color:#166534;}
.qc.wrong{background:#fee2e2;border-color:var(--red);color:#991b1b;}
[data-theme="dark"] .qc.correct{background:#166534;color:#bbf7d0;}
[data-theme="dark"] .qc.wrong{background:#7f1d1d;color:#fecaca;}
.score-row{display:flex;gap:20px;justify-content:center;margin-bottom:16px;}
.sc2{text-align:center;}
.sc2-v{font-size:28px;font-weight:900;}
.sc2-v.g{color:var(--green);}
.sc2-v.r{color:var(--red);}
.sc2-l{font-size:9px;font-weight:900;text-transform:uppercase;color:var(--muted);}
.quiz-next{width:100%;padding:11px;background:var(--blue);border:none;border-radius:12px;
  color:#fff;font-size:13px;font-weight:900;cursor:pointer;display:none;}
.quiz-next.show{display:block;}
.info-tip{font-size:11px;color:var(--muted);line-height:1.5;margin-top:8px;
  padding:10px 12px;background:var(--sl100);border-radius:10px;}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">
  <div>
    <div class="hdr-title">🎹 <span id="hdrTitle">Транспозиция</span></div>
    <div class="hdr-sub" id="hdrSub">Перенос высоты</div>
  </div>
  <div class="hdr-btns">
    <button class="hbtn" id="themeBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="themeIco">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <span id="themeText">Тёмная</span>
    </button>
    <button class="hbtn" id="langBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/>
        <path d="m22 22-5-10-5 10"/><path d="M14 18h6"/>
      </svg>
      <span id="langText">RU</span>
    </button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tab0" onclick="showTab(0)"><span id="t0">Нота</span></button>
  <button class="tab" id="tab1" onclick="showTab(1)"><span id="t1">Гамма</span></button>
  <button class="tab" id="tab2" onclick="showTab(2)"><span id="t2">Викторина</span></button>
</div>

<!-- TAB 0: single note transposition -->
<div class="panel show" id="panel0">
  <div class="row">
    <div>
      <div class="label" id="lNote0">Исходная нота</div>
      <select class="sel" id="noteFrom" onchange="calcNote()"></select>
    </div>
    <div>
      <div class="label" id="lInterval">Интервал</div>
      <select class="sel" id="intervalSel" onchange="calcNote()"></select>
    </div>
  </div>
  <div class="result-box" id="noteResult">
    <div class="result-note" id="resultNote">–</div>
    <div class="result-label" id="resultLabel">результат</div>
  </div>
  <div class="info-tip" id="noteTip"></div>
</div>

<!-- TAB 1: scale transposition -->
<div class="panel" id="panel1">
  <div class="row">
    <div>
      <div class="label" id="lKey1">Исходная тональность</div>
      <select class="sel" id="keyFrom" onchange="calcScale()"></select>
    </div>
    <div>
      <div class="label" id="lKey2">Целевая тональность</div>
      <select class="sel" id="keyTo" onchange="calcScale()"></select>
    </div>
  </div>
  <div class="label" id="lOrigScale">Исходная гамма</div>
  <div class="scale-row" id="scaleFrom"></div>
  <div class="arrow">↓</div>
  <div class="label" id="lTransScale">Транспонированная гамма</div>
  <div class="scale-row" id="scaleTo"></div>
  <div class="info-tip" id="scaleTip"></div>
</div>

<!-- TAB 2: quiz -->
<div class="panel" id="panel2">
  <div class="score-row">
    <div class="sc2"><div class="sc2-v g" id="qsc">0</div><div class="sc2-l" id="qslC">Верно</div></div>
    <div class="sc2"><div class="sc2-v r" id="qsw">0</div><div class="sc2-l" id="qslW">Ошибки</div></div>
  </div>
  <div class="quiz-q" id="quizQ2"></div>
  <div class="choices" id="quizChoices2"></div>
  <button class="quiz-next" id="quizNext2" onclick="nextQuiz2()"><span id="qnTxt">Следующий →</span></button>
</div>
</div>

<script>
/* ─── DATA ──────────────────────────────────────── */
// Chromatic scale (sharps version)
const CHROMATIC = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];
const CHROM_FLAT = ['C','D♭','D','E♭','E','F','G♭','G','A♭','A','B♭','B'];

// Note names RU
const NOTE_RU = ['До','До♯','Ре','Ре♯','Ми','Фа','Фа♯','Соль','Соль♯','Ля','Ля♯','Си'];
const NOTE_EN = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];

// Intervals
const INTERVALS = [
  {semis:1, ru:'м.2 (полутон)', en:'m2 (semitone)'},
  {semis:2, ru:'б.2 (тон)', en:'M2 (tone)'},
  {semis:3, ru:'м.3', en:'m3'},
  {semis:4, ru:'б.3', en:'M3'},
  {semis:5, ru:'ч.4', en:'P4'},
  {semis:6, ru:'ув.4 / ум.5', en:'A4 / d5'},
  {semis:7, ru:'ч.5', en:'P5'},
  {semis:8, ru:'м.6', en:'m6'},
  {semis:9, ru:'б.6', en:'M6'},
  {semis:10,ru:'м.7', en:'m7'},
  {semis:11,ru:'б.7', en:'M7'},
  {semis:12,ru:'Октава', en:'Octave'},
  {semis:-1, ru:'м.2 вниз', en:'m2 down'},
  {semis:-2, ru:'б.2 вниз', en:'M2 down'},
  {semis:-3, ru:'м.3 вниз', en:'m3 down'},
  {semis:-4, ru:'б.3 вниз', en:'M3 down'},
  {semis:-5, ru:'ч.4 вниз', en:'P4 down'},
  {semis:-7, ru:'ч.5 вниз', en:'P5 down'},
  {semis:-12,ru:'Октава вниз', en:'Octave down'},
];

// Major scales: root index → array of 7 scale degrees (semitone indices)
const MAJ_SCALE = [0,2,4,5,7,9,11]; // intervals from root

// Keys with their preferred note spellings
const KEYS = [
  {name:{ru:'До мажор',en:'C major'},root:0,
   notes:['C','D','E','F','G','A','B']},
  {name:{ru:'Соль мажор',en:'G major'},root:7,
   notes:['G','A','B','C','D','E','F♯']},
  {name:{ru:'Ре мажор',en:'D major'},root:2,
   notes:['D','E','F♯','G','A','B','C♯']},
  {name:{ru:'Ля мажор',en:'A major'},root:9,
   notes:['A','B','C♯','D','E','F♯','G♯']},
  {name:{ru:'Ми мажор',en:'E major'},root:4,
   notes:['E','F♯','G♯','A','B','C♯','D♯']},
  {name:{ru:'Си мажор',en:'B major'},root:11,
   notes:['B','C♯','D♯','E','F♯','G♯','A♯']},
  {name:{ru:'Фа♯ мажор',en:'F♯ major'},root:6,
   notes:['F♯','G♯','A♯','B','C♯','D♯','E♯']},
  {name:{ru:'Ре♭ мажор',en:'D♭ major'},root:1,
   notes:['D♭','E♭','F','G♭','A♭','B♭','C']},
  {name:{ru:'Ля♭ мажор',en:'A♭ major'},root:8,
   notes:['A♭','B♭','C','D♭','E♭','F','G']},
  {name:{ru:'Ми♭ мажор',en:'E♭ major'},root:3,
   notes:['E♭','F','G','A♭','B♭','C','D']},
  {name:{ru:'Си♭ мажор',en:'B♭ major'},root:10,
   notes:['B♭','C','D','E♭','F','G','A']},
  {name:{ru:'Фа мажор',en:'F major'},root:5,
   notes:['F','G','A','B♭','C','D','E']},
];

let lang='ru', quizScore2={c:0,w:0}, quizCorrect2=null;

/* ─── POPULATE SELECTS ───────────────────────────── */
function populateSelects(){
  const nf=document.getElementById('noteFrom');
  const ns=NOTE_EN.map((n,i)=>
    `<option value="${i}">${lang==='ru'?NOTE_RU[i]:NOTE_EN[i]} (${NOTE_EN[i]})</option>`
  ).join('');
  nf.innerHTML=ns;

  const iv=document.getElementById('intervalSel');
  iv.innerHTML=INTERVALS.map((v,i)=>
    `<option value="${i}">${v[lang]}</option>`
  ).join('');

  const kf=document.getElementById('keyFrom');
  const kt=document.getElementById('keyTo');
  const ks=KEYS.map((k,i)=>`<option value="${i}">${k.name[lang]}</option>`).join('');
  kf.innerHTML=ks;
  kt.innerHTML=ks;
  document.getElementById('keyTo').value='1'; // G major
}

/* ─── TAB 0: NOTE TRANSPOSITION ─────────────────── */
function calcNote(){
  const noteIdx=parseInt(document.getElementById('noteFrom').value);
  const ivIdx=parseInt(document.getElementById('intervalSel').value);
  const semis=INTERVALS[ivIdx].semis;
  const resultIdx=((noteIdx+semis)%12+12)%12;
  const resultEN=NOTE_EN[resultIdx];
  const resultRU=NOTE_RU[resultIdx];
  document.getElementById('resultNote').textContent=lang==='ru'?resultRU:resultEN;
  const L=lang==='ru';
  document.getElementById('resultLabel').textContent=L?'результат':'result';
  // tip
  const srcNote=L?NOTE_RU[noteIdx]:NOTE_EN[noteIdx];
  const ivName=INTERVALS[ivIdx][lang];
  document.getElementById('noteTip').textContent=
    (L?`${srcNote} + ${ivName} = ${resultRU} (${resultEN})`
      :`${NOTE_EN[noteIdx]} + ${ivName} = ${resultEN}`);
}

/* ─── TAB 1: SCALE TRANSPOSITION ────────────────── */
function calcScale(){
  const fi=parseInt(document.getElementById('keyFrom').value);
  const ti=parseInt(document.getElementById('keyTo').value);
  const fk=KEYS[fi], tk=KEYS[ti];

  const sfEl=document.getElementById('scaleFrom');
  const stEl=document.getElementById('scaleTo');
  sfEl.innerHTML=fk.notes.map((n,i)=>
    `<span class="sc${i===0?' root':''}">${n}</span>`).join('');
  stEl.innerHTML=tk.notes.map((n,i)=>
    `<span class="sc${i===0?' root':' hi'}">${n}</span>`).join('');

  // tip: semitone diff
  const diff=((tk.root-fk.root)%12+12)%12;
  const L=lang==='ru';
  const iv=INTERVALS.find(x=>x.semis===diff);
  const ivName=iv?iv[lang]:`+${diff} ${L?'пт':'st'}`;
  document.getElementById('scaleTip').textContent=
    L?`Транспозиция на ${ivName} вверх`:`Transposed up by ${ivName}`;
}

/* ─── TAB 2: QUIZ ────────────────────────────────── */
function nextQuiz2(){
  document.getElementById('quizNext2').classList.remove('show');
  // random question: what note is X transposed by interval Y?
  const noteIdx=Math.floor(Math.random()*12);
  const ivIdx=Math.floor(Math.random()*8); // use first 8 intervals (up only)
  const semis=INTERVALS[ivIdx].semis;
  const resultIdx=((noteIdx+semis)%12+12)%12;
  quizCorrect2=resultIdx;

  const L=lang==='ru';
  const srcNote=L?NOTE_RU[noteIdx]:NOTE_EN[noteIdx];
  const ivName=INTERVALS[ivIdx][lang];
  document.getElementById('quizQ2').textContent=
    L?`Нота ${srcNote} (${NOTE_EN[noteIdx]}) + ${ivName} = ?`
     :`Note ${NOTE_EN[noteIdx]} + ${ivName} = ?`;

  // choices
  const wrong=[...Array(12).keys()].filter(x=>x!==resultIdx)
    .sort(()=>Math.random()-.5).slice(0,3);
  const choices=[resultIdx,...wrong].sort(()=>Math.random()-.5);
  document.getElementById('quizChoices2').innerHTML=choices.map(ci=>{
    const label=L?`${NOTE_RU[ci]} (${NOTE_EN[ci]})`:NOTE_EN[ci];
    return `<button class="qc" data-val="${ci}" onclick="answerQuiz2(this)">${label}</button>`;
  }).join('');
}

function answerQuiz2(btn){
  const chosen=parseInt(btn.dataset.val);
  document.querySelectorAll('#quizChoices2 .qc').forEach(b=>{
    b.disabled=true;
    if(parseInt(b.dataset.val)===quizCorrect2)b.classList.add('correct');
    else if(b===btn&&chosen!==quizCorrect2)b.classList.add('wrong');
  });
  if(chosen===quizCorrect2){quizScore2.c++;}else{quizScore2.w++;}
  document.getElementById('qsc').textContent=quizScore2.c;
  document.getElementById('qsw').textContent=quizScore2.w;
  document.getElementById('quizNext2').classList.add('show');
  if(chosen===quizCorrect2)setTimeout(nextQuiz2,1400);
}

/* ─── TABS ───────────────────────────────────────── */
function showTab(n){
  for(let i=0;i<3;i++){
    document.getElementById(`tab${i}`).classList.toggle('active',i===n);
    document.getElementById(`panel${i}`).classList.toggle('show',i===n);
  }
  if(n===2&&!document.getElementById('quizQ2').textContent)nextQuiz2();
}

/* ─── LANG / THEME ───────────────────────────────── */
function applyLang(){
  const L=lang==='ru';
  document.getElementById('hdrTitle').textContent=L?'Транспозиция':'Transposition';
  document.getElementById('hdrSub').textContent=L?'Перенос высоты':'Pitch Transfer';
  document.getElementById('t0').textContent=L?'Нота':'Note';
  document.getElementById('t1').textContent=L?'Гамма':'Scale';
  document.getElementById('t2').textContent=L?'Викторина':'Quiz';
  document.getElementById('lNote0').textContent=L?'Исходная нота':'Source note';
  document.getElementById('lInterval').textContent=L?'Интервал':'Interval';
  document.getElementById('resultLabel').textContent=L?'результат':'result';
  document.getElementById('lKey1').textContent=L?'Исходная тональность':'Source key';
  document.getElementById('lKey2').textContent=L?'Целевая тональность':'Target key';
  document.getElementById('lOrigScale').textContent=L?'Исходная гамма':'Source scale';
  document.getElementById('lTransScale').textContent=L?'Транспонированная гамма':'Transposed scale';
  document.getElementById('qslC').textContent=L?'Верно':'Correct';
  document.getElementById('qslW').textContent=L?'Ошибки':'Errors';
  document.getElementById('qnTxt').textContent=L?'Следующий →':'Next →';
  const dk=document.documentElement.getAttribute('data-theme')==='dark';
  document.getElementById('themeText').textContent=dk?(L?'Светлая':'Light'):(L?'Тёмная':'Dark');
  populateSelects();
  calcNote();
  calcScale();
  if(document.getElementById('quizQ2').textContent)nextQuiz2();
}

document.getElementById('langBtn').addEventListener('click',()=>{
  lang=lang==='ru'?'en':'ru';
  document.getElementById('langText').textContent=lang==='ru'?'RU':'EN';
  applyLang();
});
document.getElementById('themeBtn').addEventListener('click',()=>{
  const dk=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',dk?'light':'dark');
  const L=lang==='ru';
  document.getElementById('themeText').textContent=dk?(L?'Тёмная':'Dark'):(L?'Светлая':'Light');
  document.getElementById('themeIco').innerHTML=dk
    ?'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    :'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
});

populateSelects();
calcNote();
calcScale();
</script>
</body>
</html>
