<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Тональности</title>
<script>(function(){var t=localStorage.getItem('musicapp_theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else document.documentElement.setAttribute('data-theme','light');})()</script>
<style>
:root{--bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#94a3b8;--border:#e2e8f0;
  --sl100:#f1f5f9;--sl200:#e2e8f0;--blue:#2563eb;--blue2:#1d4ed8;
  --green:#16a34a;--red:#dc2626;--shadow:0 1px 4px rgba(0,0,0,.07);}
[data-theme="dark"]{--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--muted:#64748b;
  --border:#334155;--sl100:#334155;--sl200:#475569;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);transition:background .3s,color .3s;}
.wrap{max-width:960px;margin:0 auto;padding:12px 14px;}
.hdr{display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;background:var(--card);border:1px solid var(--border);
  border-radius:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.hdr-title{font-weight:900;font-size:15px;}
.hdr-sub{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;}
.hdr-btns{display:flex;gap:6px;}
.hbtn{padding:6px 11px;background:var(--sl100);border:none;border-radius:10px;
  font-size:10px;font-weight:800;text-transform:uppercase;cursor:pointer;
  color:var(--text);display:flex;align-items:center;gap:5px;}
.hbtn:hover{background:var(--sl200);}
.main{display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:start;}
@media(max-width:640px){.main{grid-template-columns:1fr;}}
.circle-wrap{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;}
.circle-wrap svg{max-width:360px;width:100%;}
.sector{cursor:pointer;transition:opacity .15s;}
.sector:hover{opacity:.85;}
.sector.active{filter:brightness(1.15);}
.side{display:flex;flex-direction:column;gap:12px;}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:18px;box-shadow:var(--shadow);min-height:260px;}
.info-empty{display:flex;align-items:center;justify-content:center;
  height:100%;color:var(--muted);font-size:13px;font-weight:600;text-align:center;}
.info-key-name{font-size:22px;font-weight:900;margin-bottom:4px;}
.info-signs{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:14px;}
.info-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;}
.info-row:last-child{border-bottom:none;}
.info-lbl{color:var(--muted);font-weight:700;}
.info-val{font-weight:800;text-align:right;}
.notes-grid{display:flex;gap:4px;flex-wrap:wrap;margin:10px 0;}
.note-chip{padding:4px 9px;background:var(--sl100);border-radius:8px;
  font-size:11px;font-weight:800;}
.note-chip.root{background:var(--blue);color:#fff;}
.mode-row{display:flex;gap:6px;margin-bottom:12px;}
.mode-btn{padding:6px 14px;background:var(--sl100);border:none;border-radius:10px;
  font-size:11px;font-weight:800;cursor:pointer;color:var(--text);}
.mode-btn.active{background:var(--blue);color:#fff;}
.quiz-panel{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:18px;box-shadow:var(--shadow);}
.quiz-q{font-size:15px;font-weight:800;margin-bottom:14px;line-height:1.4;}
.quiz-choices{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
.qc{padding:10px;border:2px solid var(--border);border-radius:12px;
  background:var(--card);font-size:12px;font-weight:700;cursor:pointer;
  text-align:center;transition:all .15s;color:var(--text);}
.qc:hover:not(:disabled){border-color:var(--blue);}
.qc.correct{background:#dcfce7;border-color:var(--green);color:#166534;}
.qc.wrong{background:#fee2e2;border-color:var(--red);color:#991b1b;}
[data-theme="dark"] .qc.correct{background:#166534;color:#bbf7d0;}
[data-theme="dark"] .qc.wrong{background:#7f1d1d;color:#fecaca;}
.quiz-score{display:flex;gap:20px;justify-content:center;margin-bottom:14px;}
.qs{text-align:center;}
.qs-v{font-size:24px;font-weight:900;}
.qs-v.g{color:var(--green);}
.qs-v.r{color:var(--red);}
.qs-l{font-size:9px;font-weight:900;text-transform:uppercase;color:var(--muted);}
.quiz-next{width:100%;padding:10px;background:var(--blue);border:none;border-radius:12px;
  color:#fff;font-size:12px;font-weight:900;cursor:pointer;display:none;}
.quiz-next.show{display:block;}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--muted);}
.leg-dot{width:10px;height:10px;border-radius:50%;}
@media(max-width:600px){
  .hdr{flex-wrap:wrap;gap:8px;padding:10px 12px;}
  .hdr-btns{gap:4px;}
  .hbtn{padding:7px 9px;font-size:9px;}
  .wrap{padding:10px;}
  .mode-row{flex-wrap:wrap;}
  .info-card{min-height:auto;}
}
@media(max-width:400px){
  .circle-wrap svg{max-width:100%;}
  .quiz-choices{grid-template-columns:1fr;}
  .hdr-title{font-size:13px;}
}
</style>
</head>
<body>
<div class="wrap">
<a href="../index.html" style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;text-decoration:none;opacity:.65;padding:5px 11px;border:1px solid rgba(128,128,128,.25);border-radius:10px;margin-bottom:8px;color:inherit;">← Главная</a>
<div class="hdr">
  <div>
    <div class="hdr-title">🔑 <span id="hdrTitle">Тональности</span></div>
    <div class="hdr-sub" id="hdrSub">Квинтовый круг</div>
  </div>
  <div class="hdr-btns">
    <button class="hbtn" id="themeBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="themeIco">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <span id="themeText">Тёмная</span>
    </button>
    <button class="hbtn" id="langBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/>
        <path d="m22 22-5-10-5 10"/><path d="M14 18h6"/>
      </svg>
      <span id="langText">RU</span>
    </button>
  </div>
</div>

<div class="mode-row">
  <button class="mode-btn active" id="modeExplore" onclick="setMode('explore')"><span id="mExplore">Обзор</span></button>
  <button class="mode-btn" id="modeQuiz" onclick="setMode('quiz')"><span id="mQuiz">Викторина</span></button>
</div>

<div class="main">
  <div class="circle-wrap">
    <svg id="circleSvg" viewBox="0 0 440 440" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:#94a3b8"></div><span id="legMaj">Мажор</span></div>
      <div class="leg"><div class="leg-dot" style="background:#64748b"></div><span id="legMin">Минор</span></div>
    </div>
  </div>
  <div class="side">
    <div class="info-card" id="infoCard">
      <div class="info-empty" id="infoEmpty"><span id="infoHint">Нажмите на тональность</span></div>
      <div id="infoContent" style="display:none">
        <div class="info-key-name" id="infoName"></div>
        <div class="info-signs" id="infoSigns"></div>
        <div class="notes-grid" id="infoNotes"></div>
        <div class="info-row"><span class="info-lbl" id="lParallel">Параллельная</span><span class="info-val" id="infoParallel"></span></div>
        <div class="info-row"><span class="info-lbl" id="lDominant">Доминанта</span><span class="info-val" id="infoDominant"></span></div>
        <div class="info-row"><span class="info-lbl" id="lSubdom">Субдоминанта</span><span class="info-val" id="infoSubdom"></span></div>
        <div class="info-row"><span class="info-lbl" id="lParMaj">Параллельный мажор</span><span class="info-val" id="infoParMaj"></span></div>
      </div>
    </div>
    <div class="quiz-panel" id="quizPanel" style="display:none">
      <div class="quiz-score">
        <div class="qs"><div class="qs-v g" id="qC">0</div><div class="qs-l" id="qCL">Верно</div></div>
        <div class="qs"><div class="qs-v r" id="qW">0</div><div class="qs-l" id="qWL">Ошибки</div></div>
      </div>
      <div class="quiz-q" id="quizQ"></div>
      <div class="quiz-choices" id="quizChoices"></div>
      <button class="quiz-next" id="quizNext" onclick="nextQuiz()"><span id="qNextTxt">Следующий →</span></button>
    </div>
  </div>
</div>
</div>

<script>
const lang_data = {
  ru:{
    title:'Тональности',sub:'Квинтовый круг',
    explore:'Обзор',quiz:'Викторина',
    dark:'Тёмная',light:'Светлая',
    legMaj:'Мажор (внешний)',legMin:'Минор (внутренний)',
    hint:'Нажмите на тональность',
    parallel:'Параллельная',dominant:'Доминанта',subdom:'Субдоминанта',parMaj:'Параллельный мажор',
    signs0:'нет знаков',sharp1:'1 диез',sharp2:'2 диеза',sharp3:'3 диеза',
    sharp4:'4 диеза',sharp5:'5 диезов',sharp6:'6 диезов',sharp7:'7 диезов',
    flat1:'1 бемоль',flat2:'2 бемоля',flat3:'3 бемоля',flat4:'4 бемоля',
    flat5:'5 бемолей',flat6:'6 бемолей',flat7:'7 бемолей',
    majLabel:'мажор',minLabel:'минор',
    correct:'Верно',wrong:'Ошибки',next:'Следующий →',
    q_signs:'Сколько знаков в тональности',
    q_name:'Назовите тональность с',
    q_rel:'Параллельная тональность к',
    q_dom:'Доминанта в тональности',
    sharps_word:'диезами',flats_word:'бемолями',sign_word:'знаком',signs_word:'знаками',
  },
  en:{
    title:'Key Signatures',sub:'Circle of Fifths',
    explore:'Explore',quiz:'Quiz',
    dark:'Dark',light:'Light',
    legMaj:'Major (outer)',legMin:'Minor (inner)',
    hint:'Click on a key',
    parallel:'Relative minor',dominant:'Dominant',subdom:'Subdominant',parMaj:'Parallel major',
    signs0:'no sharps/flats',sharp1:'1 sharp',sharp2:'2 sharps',sharp3:'3 sharps',
    sharp4:'4 sharps',sharp5:'5 sharps',sharp6:'6 sharps',sharp7:'7 sharps',
    flat1:'1 flat',flat2:'2 flats',flat3:'3 flats',flat4:'4 flats',
    flat5:'5 flats',flat6:'6 flats',flat7:'7 flats',
    majLabel:'major',minLabel:'minor',
    correct:'Correct',wrong:'Errors',next:'Next →',
    q_signs:'How many sharps/flats in',
    q_name:'Name the key with',
    q_rel:'Relative key of',
    q_dom:'Dominant of',
    sharps_word:'sharps',flats_word:'flats',sign_word:'sign',signs_word:'signs',
  }
};

// Circle of fifths data (clockwise from C at top)
const KEYS = [
  {maj:{ru:'До мажор',en:'C major',short:'C'},   min:{ru:'Ля минор',en:'A minor',short:'Am'},
   signs:0,type:'none',
   notes:['C','D','E','F','G','A','B'],
   dom:'G',subdom:'F',color:'#6366f1'},
  {maj:{ru:'Соль мажор',en:'G major',short:'G'}, min:{ru:'Ми минор',en:'E minor',short:'Em'},
   signs:1,type:'sharp',
   notes:['G','A','B','C','D','E','F♯'],
   dom:'D',subdom:'C',color:'#8b5cf6'},
  {maj:{ru:'Ре мажор',en:'D major',short:'D'},   min:{ru:'Си минор',en:'B minor',short:'Bm'},
   signs:2,type:'sharp',
   notes:['D','E','F♯','G','A','B','C♯'],
   dom:'A',subdom:'G',color:'#a855f7'},
  {maj:{ru:'Ля мажор',en:'A major',short:'A'},   min:{ru:'Фа♯ минор',en:'F♯ minor',short:'F♯m'},
   signs:3,type:'sharp',
   notes:['A','B','C♯','D','E','F♯','G♯'],
   dom:'E',subdom:'D',color:'#ec4899'},
  {maj:{ru:'Ми мажор',en:'E major',short:'E'},   min:{ru:'До♯ минор',en:'C♯ minor',short:'C♯m'},
   signs:4,type:'sharp',
   notes:['E','F♯','G♯','A','B','C♯','D♯'],
   dom:'B',subdom:'A',color:'#ef4444'},
  {maj:{ru:'Си мажор',en:'B major',short:'B'},   min:{ru:'Соль♯ минор',en:'G♯ minor',short:'G♯m'},
   signs:5,type:'sharp',
   notes:['B','C♯','D♯','E','F♯','G♯','A♯'],
   dom:'F♯',subdom:'E',color:'#f97316'},
  {maj:{ru:'Фа♯ мажор',en:'F♯ major',short:'F♯'},min:{ru:'Ре♯ минор',en:'D♯ minor',short:'D♯m'},
   signs:6,type:'sharp',
   notes:['F♯','G♯','A♯','B','C♯','D♯','E♯'],
   dom:'C♯',subdom:'B',color:'#eab308'},
  {maj:{ru:'Ре♭ мажор',en:'D♭ major',short:'D♭'},min:{ru:'Си♭ минор',en:'B♭ minor',short:'B♭m'},
   signs:5,type:'flat',
   notes:['D♭','E♭','F','G♭','A♭','B♭','C'],
   dom:'A♭',subdom:'G♭',color:'#84cc16'},
  {maj:{ru:'Ля♭ мажор',en:'A♭ major',short:'A♭'},min:{ru:'Фа минор',en:'F minor',short:'Fm'},
   signs:4,type:'flat',
   notes:['A♭','B♭','C','D♭','E♭','F','G'],
   dom:'E♭',subdom:'D♭',color:'#22c55e'},
  {maj:{ru:'Ми♭ мажор',en:'E♭ major',short:'E♭'},min:{ru:'До минор',en:'C minor',short:'Cm'},
   signs:3,type:'flat',
   notes:['E♭','F','G','A♭','B♭','C','D'],
   dom:'B♭',subdom:'A♭',color:'#14b8a6'},
  {maj:{ru:'Си♭ мажор',en:'B♭ major',short:'B♭'},min:{ru:'Соль минор',en:'G minor',short:'Gm'},
   signs:2,type:'flat',
   notes:['B♭','C','D','E♭','F','G','A'],
   dom:'F',subdom:'E♭',color:'#0ea5e9'},
  {maj:{ru:'Фа мажор',en:'F major',short:'F'},   min:{ru:'Ре минор',en:'D minor',short:'Dm'},
   signs:1,type:'flat',
   notes:['F','G','A','B♭','C','D','E'],
   dom:'C',subdom:'B♭',color:'#3b82f6'},
];

let lang=localStorage.getItem('musicapp_lang')||'ru', mode='explore', selected=null, quizScore={c:0,w:0}, quizCorrect=null;

/* ─── SVG CIRCLE ─────────────────────────────── */
function arcPath(cx,cy,r1,r2,aDeg1,aDeg2){
  const a1=aDeg1*Math.PI/180, a2=aDeg2*Math.PI/180;
  const x1=cx+r1*Math.cos(a1),y1=cy+r1*Math.sin(a1);
  const x2=cx+r1*Math.cos(a2),y2=cy+r1*Math.sin(a2);
  const x3=cx+r2*Math.cos(a2),y3=cy+r2*Math.sin(a2);
  const x4=cx+r2*Math.cos(a1),y4=cy+r2*Math.sin(a1);
  return `M${x1},${y1}A${r1},${r1},0,0,1,${x2},${y2}L${x3},${y3}A${r2},${r2},0,0,0,${x4},${y4}Z`;
}

function drawCircle(){
  const svg=document.getElementById('circleSvg');
  const cx=220,cy=220;
  const R1=180,R2=130,R3=125,R4=85;
  const GAP=1.5; // gap between sectors in degrees
  let html='';

  KEYS.forEach((k,i)=>{
    const a1=-90+i*30+GAP/2, a2=-90+(i+1)*30-GAP/2;
    const am=(a1+a2)/2;
    // outer sector (major)
    html+=`<path class="sector" data-idx="${i}" data-type="maj" d="${arcPath(cx,cy,R1,R2,a1,a2)}"
      fill="${k.color}" fill-opacity="0.85" stroke="var(--bg)" stroke-width="2"
      onclick="selectKey(${i},'maj')"/>`;
    // inner sector (minor)
    html+=`<path class="sector" data-idx="${i}" data-type="min" d="${arcPath(cx,cy,R3-2,R4,a1,a2)}"
      fill="${k.color}" fill-opacity="0.55" stroke="var(--bg)" stroke-width="2"
      onclick="selectKey(${i},'min')"/>`;
    // major label
    const amr=am*Math.PI/180;
    const lrMaj=(R1+R2)/2, lrMin=(R3-2+R4)/2;
    const lxM=cx+lrMaj*Math.cos(amr), lyM=cy+lrMaj*Math.sin(amr);
    const lxm=cx+lrMin*Math.cos(amr), lym=cy+lrMin*Math.sin(amr);
    html+=`<text x="${lxM}" y="${lyM}" text-anchor="middle" dominant-baseline="central"
      font-size="13" font-weight="800" fill="#fff" pointer-events="none">${k.maj.short}</text>`;
    html+=`<text x="${lxm}" y="${lym}" text-anchor="middle" dominant-baseline="central"
      font-size="10" font-weight="700" fill="#fff" pointer-events="none">${k.min.short}</text>`;
  });

  // center circle
  html+=`<circle cx="${cx}" cy="${cy}" r="80" fill="var(--card)" stroke="var(--border)" stroke-width="2"/>`;
  html+=`<text id="centerText1" x="${cx}" y="${cy-10}" text-anchor="middle" font-size="18"
    font-weight="900" fill="var(--text)">🔑</text>`;
  html+=`<text id="centerText2" x="${cx}" y="${cy+14}" text-anchor="middle" font-size="11"
    font-weight="700" fill="var(--muted)" id="ctrHint"></text>`;
  svg.innerHTML=html;
  updateCenterHint();
}

function updateCenterHint(){
  const el=document.getElementById('centerText2');
  if(el)el.textContent=selected?'':(lang==='ru'?'нажми':'click');
}

function selectKey(idx,type){
  selected={idx,type};
  // remove old active
  document.querySelectorAll('.sector.active').forEach(s=>s.classList.remove('active'));
  const el=document.querySelector(`.sector[data-idx="${idx}"][data-type="${type}"]`);
  if(el)el.classList.add('active');
  showInfo(idx,type);
  updateCenterHint();
}

function showInfo(idx,type){
  const k=KEYS[idx];
  const L=lang_data[lang];
  const isMaj=type==='maj';
  const keyObj=isMaj?k.maj:k.min;
  document.getElementById('infoEmpty').style.display='none';
  document.getElementById('infoContent').style.display='block';
  document.getElementById('infoName').textContent=keyObj[lang];
  // signs text
  let signsText;
  if(k.signs===0) signsText=L.signs0;
  else{
    const key=k.type==='sharp'?`sharp${k.signs}`:`flat${k.signs}`;
    signsText=L[key];
  }
  document.getElementById('infoSigns').textContent=signsText;
  // notes
  const notesEl=document.getElementById('infoNotes');
  notesEl.innerHTML=k.notes.map((n,i)=>
    `<span class="note-chip${i===0?' root':''}">${n}</span>`
  ).join('');
  // relations
  if(isMaj){
    document.getElementById('infoParallel').textContent=k.min[lang];
    document.getElementById('infoDominant').textContent=k.dom+' '+L.majLabel;
    document.getElementById('infoSubdom').textContent=k.subdom+' '+L.majLabel;
    document.getElementById('lParallel').textContent=L.parallel;
    document.getElementById('lParMaj').parentElement.style.display='none';
  } else {
    // find major idx+3 positions = relative major (already in same slot)
    document.getElementById('infoParallel').textContent=k.maj[lang];
    document.getElementById('infoDominant').textContent=
      KEYS[(idx+7)%12].min.short+' '+L.minLabel;
    document.getElementById('infoSubdom').textContent=
      KEYS[(idx+5)%12].min.short+' '+L.minLabel;
    document.getElementById('lParallel').textContent=L.parMaj;
    document.getElementById('lParMaj').parentElement.style.display='none';
  }
}

/* ─── QUIZ ─────────────────────────────────────── */
let quizType=null;
function nextQuiz(){
  const L=lang_data[lang];
  document.getElementById('quizNext').classList.remove('show');
  // random question type
  const types=['signs','name','rel','dom'];
  quizType=types[Math.floor(Math.random()*types.length)];
  const idx=Math.floor(Math.random()*12);
  const isMaj=Math.random()>.5;
  quizCorrect={idx,isMaj};
  const k=KEYS[idx];
  const keyName=isMaj?k.maj[lang]:k.min[lang];

  let qText='';
  let correctAns='';
  let wrongPool=[];

  if(quizType==='signs'){
    qText=`${L.q_signs} ${keyName}?`;
    correctAns=signsLabel(k,lang);
    wrongPool=KEYS.filter((_,i)=>i!==idx).map(x=>signsLabel(x,lang));
  } else if(quizType==='name'){
    const sigStr=signsLabel(k,lang);
    qText=`${L.q_name} ${sigStr}?`;
    correctAns=keyName;
    wrongPool=KEYS.filter((_,i)=>i!==idx).map(x=>isMaj?x.maj[lang]:x.min[lang]);
  } else if(quizType==='rel'){
    qText=`${L.q_rel} ${keyName}?`;
    correctAns=isMaj?k.min[lang]:k.maj[lang];
    wrongPool=KEYS.filter((_,i)=>i!==idx).map(x=>isMaj?x.min[lang]:x.maj[lang]);
  } else {
    qText=`${L.q_dom} ${keyName}?`;
    const domIdx=(idx+1)%12;
    correctAns=(isMaj?KEYS[domIdx].maj[lang]:KEYS[(idx+7)%12].min[lang]);
    wrongPool=KEYS.map(x=>isMaj?x.maj[lang]:x.min[lang]).filter(x=>x!==correctAns);
  }

  document.getElementById('quizQ').textContent=qText;

  // shuffle 3 wrong + correct
  const wrongs=[...new Set(wrongPool)].sort(()=>Math.random()-.5).slice(0,3);
  const choices=[correctAns,...wrongs].sort(()=>Math.random()-.5);

  document.getElementById('quizChoices').innerHTML=choices.map(c=>
    `<button class="qc" onclick="answerQuiz(this,'${esc(c)}','${esc(correctAns)}')">${c}</button>`
  ).join('');
}

function esc(s){return s.replace(/'/g,"\\'")}

function signsLabel(k,lg){
  const L=lang_data[lg];
  if(k.signs===0)return L.signs0;
  return L[k.type==='sharp'?`sharp${k.signs}`:`flat${k.signs}`];
}

function answerQuiz(btn,chosen,correct){
  document.querySelectorAll('.qc').forEach(b=>b.disabled=true);
  document.querySelectorAll('.qc').forEach(b=>{
    if(b.textContent===correct)b.classList.add('correct');
    else if(b===btn&&chosen!==correct)b.classList.add('wrong');
  });
  if(chosen===correct){quizScore.c++;}else{quizScore.w++;}
  document.getElementById('qC').textContent=quizScore.c;
  document.getElementById('qW').textContent=quizScore.w;
  document.getElementById('quizNext').classList.add('show');
  if(chosen===correct)setTimeout(nextQuiz,1400);
}

function setMode(m){
  mode=m;
  document.getElementById('modeExplore').classList.toggle('active',m==='explore');
  document.getElementById('modeQuiz').classList.toggle('active',m==='quiz');
  document.getElementById('quizPanel').style.display=m==='quiz'?'block':'none';
  if(m==='quiz'){quizScore={c:0,w:0};document.getElementById('qC').textContent=0;
    document.getElementById('qW').textContent=0;nextQuiz();}
}

/* ─── LANG / THEME ─────────────────────────────── */
function applyLang(){
  const L=lang_data[lang];
  document.getElementById('hdrTitle').textContent=L.title;
  document.getElementById('hdrSub').textContent=L.sub;
  document.getElementById('mExplore').textContent=L.explore;
  document.getElementById('mQuiz').textContent=L.quiz;
  document.getElementById('legMaj').textContent=L.legMaj;
  document.getElementById('legMin').textContent=L.legMin;
  document.getElementById('infoHint').textContent=L.hint;
  document.getElementById('lParallel').textContent=L.parallel;
  document.getElementById('lDominant').textContent=L.dominant;
  document.getElementById('lSubdom').textContent=L.subdom;
  document.getElementById('lParMaj').textContent=L.parMaj;
  document.getElementById('qCL').textContent=L.correct;
  document.getElementById('qWL').textContent=L.wrong;
  document.getElementById('qNextTxt').textContent=L.next;
  const dk=document.documentElement.getAttribute('data-theme')==='dark';
  document.getElementById('themeText').textContent=dk?L.light:L.dark;
  if(selected)showInfo(selected.idx,selected.type);
  updateCenterHint();
  if(mode==='quiz')nextQuiz();
}

document.getElementById('langBtn').addEventListener('click',()=>{
  lang=lang==='ru'?'en':'ru';

});

  drawCircle();

drawCircle();
applyLang();
