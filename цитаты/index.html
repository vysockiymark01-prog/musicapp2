<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Цитатник</title>
<script>(function(){var t=localStorage.getItem('musicapp_theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else document.documentElement.setAttribute('data-theme','light');})()</script>
<style>
:root{
  --bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#94a3b8;--border:#e2e8f0;
  --sl100:#f1f5f9;--sl200:#e2e8f0;--sl300:#cbd5e1;--sl500:#64748b;--sl700:#334155;
  --blue:#2563eb;--blue2:#1d4ed8;--green:#16a34a;--red:#dc2626;
  --shadow:0 1px 4px rgba(0,0,0,.07);
}
[data-theme="dark"]{
  --bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--muted:#64748b;--border:#334155;
  --sl100:#334155;--sl200:#334155;--sl300:#475569;--sl500:#94a3b8;--sl700:#e2e8f0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);transition:background .3s,color .3s;}
.wrap{max-width:960px;margin:0 auto;padding:12px 14px;}

/* HEADER */
.hdr{display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;background:var(--card);border:1px solid var(--border);
  border-radius:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.hdr-title{font-weight:900;font-size:15px;}
.hdr-sub{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;}
.hdr-btns{display:flex;gap:6px;}
.hbtn{padding:6px 11px;background:var(--sl100);border:none;border-radius:10px;
  font-size:10px;font-weight:800;text-transform:uppercase;cursor:pointer;
  color:var(--text);display:flex;align-items:center;gap:5px;}
.hbtn:hover{background:var(--sl200);}

/* CONTROLS */
.controls{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:12px 14px;margin-bottom:12px;display:flex;flex-direction:column;gap:10px;}
.search-wrap{position:relative;}
.search-inp{width:100%;padding:9px 36px 9px 14px;border:1.5px solid var(--border);
  border-radius:12px;background:var(--sl100);color:var(--text);font-size:13px;
  outline:none;transition:border-color .2s;}
.search-inp:focus{border-color:var(--blue);}
.search-ico{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.filter-lbl{font-size:9px;font-weight:900;text-transform:uppercase;color:var(--muted);
  white-space:nowrap;}
.chip{padding:5px 12px;border:1.5px solid var(--border);border-radius:20px;
  background:var(--card);font-size:11px;font-weight:700;cursor:pointer;
  color:var(--muted);transition:all .15s;white-space:nowrap;}
.chip:hover{border-color:var(--blue);color:var(--text);}
.chip.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.chip.era-baroque.active{background:#d97706;border-color:#d97706;}
.chip.era-classicism.active{background:#059669;border-color:#059669;}
.chip.era-romanticism.active{background:#7c3aed;border-color:#7c3aed;}
.chip.era-modern.active{background:#0891b2;border-color:#0891b2;}

/* STATS & ACTIONS */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.count-lbl{font-size:11px;font-weight:700;color:var(--muted);}
.top-btns{display:flex;gap:7px;}
.act-btn{padding:7px 14px;border:1.5px solid var(--border);border-radius:10px;
  background:var(--card);color:var(--text);font-size:11px;font-weight:800;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
.act-btn:hover{border-color:var(--blue);}
.act-btn.quiz-active{background:var(--blue);border-color:var(--blue);color:#fff;}
.act-btn.fav-active{background:#f59e0b;border-color:#f59e0b;color:#fff;}

/* CARDS GRID */
.cards{columns:2;column-gap:12px;}
@media(max-width:560px){.cards{columns:1;}}
.card{break-inside:avoid;background:var(--card);border:1px solid var(--border);
  border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);
  transition:transform .15s,box-shadow .15s;position:relative;}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1);}
.card.faved{border-color:#f59e0b;}

/* COMPOSER ROW */
.comp-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:900;color:#fff;flex-shrink:0;
  letter-spacing:-.5px;}
.comp-name{font-size:13px;font-weight:800;line-height:1.2;}
.comp-meta{font-size:10px;color:var(--muted);font-weight:600;margin-top:1px;}

/* ERA BADGE */
.era-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;
  font-weight:900;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.era-baroque .era-badge{background:rgba(217,119,6,.15);color:#d97706;}
.era-classicism .era-badge{background:rgba(5,150,105,.15);color:#059669;}
.era-romanticism .era-badge{background:rgba(124,58,237,.15);color:#7c3aed;}
.era-modern .era-badge{background:rgba(8,145,178,.15);color:#0891b2;}
[data-theme="dark"] .era-baroque .era-badge{background:rgba(217,119,6,.25);}
[data-theme="dark"] .era-classicism .era-badge{background:rgba(5,150,105,.25);}
[data-theme="dark"] .era-romanticism .era-badge{background:rgba(124,58,237,.25);}
[data-theme="dark"] .era-modern .era-badge{background:rgba(8,145,178,.25);}

/* QUOTE TEXT */
.quote-text{font-size:14px;line-height:1.6;color:var(--text);font-style:italic;
  border-left:3px solid var(--border);padding-left:12px;margin-bottom:12px;}
.era-baroque .quote-text{border-color:#d97706;}
.era-classicism .quote-text{border-color:#059669;}
.era-romanticism .quote-text{border-color:#7c3aed;}
.era-modern .quote-text{border-color:#0891b2;}

/* CARD FOOTER */
.card-footer{display:flex;justify-content:space-between;align-items:center;}
.theme-chip{padding:3px 9px;background:var(--sl100);border-radius:8px;
  font-size:9px;font-weight:800;text-transform:uppercase;color:var(--muted);}
.fav-btn{width:28px;height:28px;border:none;background:none;cursor:pointer;
  font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:transform .2s;color:var(--muted);border-radius:8px;}
.fav-btn:hover{transform:scale(1.3);}
.fav-btn.on{color:#f59e0b;}

/* ORIGIN BADGE */
.origin-badge{position:absolute;top:14px;right:14px;font-size:8px;font-weight:900;
  text-transform:uppercase;color:var(--muted);letter-spacing:.5px;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-ico{font-size:48px;margin-bottom:12px;}
.empty-txt{font-size:14px;font-weight:700;}

/* QUIZ OVERLAY */
.quiz-panel{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:24px;margin-bottom:12px;display:none;}
.quiz-panel.show{display:block;}
.quiz-score{display:flex;gap:24px;justify-content:center;margin-bottom:20px;}
.qs{text-align:center;}
.qs-v{font-size:28px;font-weight:900;}
.qs-v.g{color:var(--green);}
.qs-v.r{color:var(--red);}
.qs-l{font-size:9px;font-weight:900;text-transform:uppercase;color:var(--muted);}
.quiz-quote{font-size:16px;font-style:italic;line-height:1.7;text-align:center;
  border:1.5px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px;
  background:var(--sl100);}
.quiz-era{text-align:center;font-size:11px;font-weight:700;color:var(--muted);
  margin-bottom:16px;}
.quiz-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.qc-btn{padding:12px 10px;border:2px solid var(--border);border-radius:12px;
  background:var(--card);font-size:12px;font-weight:700;cursor:pointer;
  text-align:center;transition:all .15s;color:var(--text);line-height:1.3;}
.qc-btn:hover:not(:disabled){border-color:var(--blue);}
.qc-btn.correct{background:#dcfce7;border-color:var(--green);color:#166534;}
.qc-btn.wrong{background:#fee2e2;border-color:var(--red);color:#991b1b;}
.qc-btn:disabled{cursor:default;}
[data-theme="dark"] .qc-btn.correct{background:#166534;color:#bbf7d0;}
[data-theme="dark"] .qc-btn.wrong{background:#7f1d1d;color:#fecaca;}
.quiz-next{width:100%;padding:12px;background:var(--blue);border:none;
  border-radius:12px;color:#fff;font-size:13px;font-weight:900;cursor:pointer;
  display:none;}
.quiz-next.show{display:block;}
.quiz-next:hover{background:var(--blue2);}

/* RANDOM CARD */
.random-card{display:none;background:linear-gradient(135deg,#1e293b,#0f172a);
  border-radius:20px;padding:24px;margin-bottom:12px;color:#fff;text-align:center;}
.random-card.show{display:block;}
.random-quote{font-size:16px;font-style:italic;line-height:1.7;margin:16px 0;}
.random-author{font-size:13px;font-weight:700;color:rgba(255,255,255,.7);}
.random-close{margin-top:14px;padding:8px 20px;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);border-radius:10px;color:#fff;
  font-size:11px;font-weight:800;cursor:pointer;}
@media(max-width:600px){
  .hdr{flex-wrap:wrap;gap:8px;padding:10px 12px;}
  .hdr-btns{gap:4px;}
  .hbtn{padding:7px 9px;font-size:9px;}
  .wrap{padding:10px;}
  .top-bar{flex-direction:column;align-items:flex-start;gap:8px;}
  .top-btns{width:100%;justify-content:flex-start;}
  .quiz-choices{grid-template-columns:1fr;}
  .hint-box{font-size:12px;}
}
@media(max-width:400px){
  .cards{columns:1;}
  .hdr-title{font-size:13px;}
}
</style>
</head>

  </div>
</div>

<!-- RANDOM CARD -->
<div class="random-card" id="randomCard">
  <div id="randomQuote" class="random-quote"></div>
  <div id="randomAuthor" class="random-author"></div>
  <button class="random-close" onclick="closeRandom()" id="randomClose">✕ Закрыть</button>
</div>

<!-- QUIZ -->
<div class="quiz-panel" id="quizPanel">
  <div class="quiz-score">
    <div class="qs"><div class="qs-v g" id="qCorrect">0</div><div class="qs-l" id="qCLbl">Верно</div></div>

    <button class="act-btn" id="quizHintBtn" onclick="showHint()" style="display:inline-flex;margin:0 auto;">💡 Подсказка</button>
    <div id="quizHintBox" style="display:none;margin-top:8px;padding:8px 14px;background:var(--sl100);border-radius:10px;font-size:12px;font-weight:700;color:var(--muted);"></div>
  </div>
  <button class="quiz-next" id="quizNext" onclick="nextQuiz()"><span id="quizNextTxt">Следующая →</span></button>
</div>

<!-- TOP BAR -->
<div class="top-bar">
  <span class="count-lbl" id="countLbl">0 цитат</span>
  <div class="top-btns">
    <button class="act-btn" id="randomBtn" onclick="showRandom()">
      🎲 <span id="randomTxt">Случайная</span>
    </button>
    <button class="act-btn" id="favBtn" onclick="toggleFavFilter()">
      ♡ <span id="favTxt">Избранное</span>
    </button>
    <button class="act-btn" id="quizBtn" onclick="toggleQuiz()">
      🎯 <span id="quizTxt">Угадай автора</span>
    </button>
  </div>
</div>

<!-- CARDS -->
<div class="cards" id="cardsGrid"></div>
<div class="empty" id="emptyState" style="display:none">
  <div class="empty-ico">🔍</div>
  <div class="empty-txt" id="emptyTxt">Ничего не найдено</div>
</div>

</div>

/* ─── FLAT LIST ────────────────────────────────────────────────────── */
const ALL_QUOTES=[];
DATA.forEach(c=>{
  c.quotes.forEach((q,qi)=>{
    ALL_QUOTES.push({...q, cid:c.id, cidx:qi,
      composer:c.name, dates:c.dates, country:c.country,
      era:c.era, origin:c.origin, color:c.color, ini:c.ini});
  });
});

/* ─── STATE ─────────────────────────────────────────────────────────── */
let lang=localStorage.getItem('musicapp_lang')||'ru', filterEra='all', filterOrigin='all', filterTheme='all';
let searchQ='', showFavOnly=false, quizMode=false;
const favSet=new Set();
let quizScore={c:0,w:0}, quizIdx=null;

const ERA_LABELS={
  baroque:{ru:'Барокко',en:'Baroque'},
  classicism:{ru:'Классицизм',en:'Classicism'},
  romanticism:{ru:'Романтизм',en:'Romanticism'},
  modern:{ru:'XX–XXI в.',en:'20th–21st c.'}
};
const THEME_LABELS={
  music:{ru:'О музыке',en:'Music'},
  work:{ru:'О труде',en:'Work'},
  inspiration:{ru:'О вдохновении',en:'Inspiration'},
  art:{ru:'Об искусстве',en:'Art'},
  craft:{ru:'О мастерстве',en:'Craft'},
  audience:{ru:'О публике',en:'Audience'},
  life:{ru:'О жизни',en:'Life'}
};
const ORIGIN_LABELS={
  foreign:{ru:'Зарубежный',en:'Foreign'},
  russian:{ru:'Отечественный',en:'Russian'}
};

/* ─── FILTER ─────────────────────────────────────────────────────────── */
function getFiltered(){
  return ALL_QUOTES.filter(q=>{
    if(filterEra!=='all'&&q.era!==filterEra)return false;
    if(filterOrigin!=='all'&&q.origin!==filterOrigin)return false;
    if(filterTheme!=='all'&&q.theme!==filterTheme)return false;
    if(showFavOnly&&!favSet.has(qid(q)))return false;
    if(searchQ){
      const s=searchQ.toLowerCase();
      const text=(q[lang]||q.ru).toLowerCase();
      const name=(q.composer[lang]||q.composer.ru).toLowerCase();
      if(!text.includes(s)&&!name.includes(s))return false;
    }
    return true;
  });
}
function qid(q){return q.cid+'_'+q.cidx;}

/* ─── RENDER CARDS ──────────────────────────────────────────────────── */
function render(){
  const list=getFiltered();
  const grid=document.getElementById('cardsGrid');
  const empty=document.getElementById('emptyState');
  const count=document.getElementById('countLbl');

  count.textContent=lang==='ru'?`${list.length} цитат`:`${list.length} quotes`;

  if(!list.length){
    grid.innerHTML='';
    empty.style.display='block';
    document.getElementById('emptyTxt').textContent=lang==='ru'?'Ничего не найдено':'Nothing found';
    return;
  }
  empty.style.display='none';

  grid.innerHTML=list.map(q=>{
    const id=qid(q);
    const faved=favSet.has(id);
    const txt=q[lang]||q.ru;
    const cname=(q.composer[lang]||q.composer.ru);
    const country=(q.country[lang]||q.country.ru);
    const eraLabel=(ERA_LABELS[q.era]||{})[lang]||q.era;
    const themeLabel=(THEME_LABELS[q.theme]||{})[lang]||q.theme;
    const originLabel=(ORIGIN_LABELS[q.origin]||{})[lang]||q.origin;
    return `<div class="card era-${q.era}${faved?' faved':''}">
      <span class="origin-badge">${originLabel}</span>
      <div class="comp-row">
        <div class="avatar" style="background:${q.color}">${q.ini}</div>
        <div>
          <div class="comp-name">${cname}</div>
          <div class="comp-meta">${q.dates} · ${country}</div>
        </div>
      </div>
      <div><span class="era-badge">${eraLabel}</span></div>
      <div class="quote-text">${txt}</div>
      <div class="card-footer">
        <span class="theme-chip">${themeLabel}</span>
        <button class="fav-btn${faved?' on':''}" onclick="toggleFav('${id}')">${faved?'♥':'♡'}</button>
      </div>
    </div>`;
  }).join('');
}

/* ─── FAVORITES ─────────────────────────────────────────────────────── */
function toggleFav(id){
  if(favSet.has(id))favSet.delete(id);else favSet.add(id);
  render();
  const btn=document.getElementById('favBtn');
  btn.classList.toggle('fav-active',showFavOnly&&favSet.size>0);
}
function toggleFavFilter(){
  showFavOnly=!showFavOnly;
  document.getElementById('favBtn').classList.toggle('fav-active',showFavOnly);
  render();
}

/* ─── RANDOM ─────────────────────────────────────────────────────────── */
function showRandom(){
  const pool=ALL_QUOTES;
  if(!pool.length)return;
  if(showFavOnly){
    showFavOnly=false;
    document.getElementById('favBtn').classList.remove('fav-active');
    render();
  }
  const q=pool[Math.floor(Math.random()*pool.length)];
  const card=document.getElementById('randomCard');
  document.getElementById('randomQuote').textContent='"'+(q[lang]||q.ru)+'"';
  document.getElementById('randomAuthor').textContent=
    '— '+(q.composer[lang]||q.composer.ru)+', '+q.dates;
  document.getElementById('randomClose').textContent=lang==='ru'?'✕ Закрыть':'✕ Close';
  card.classList.add('show');
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closeRandom(){document.getElementById('randomCard').classList.remove('show');}

/* ─── QUIZ ──────────────────────────────────────────────────────────── */
function toggleQuiz(){
  quizMode=!quizMode;
  document.getElementById('quizPanel').classList.toggle('show',quizMode);
  document.getElementById('quizBtn').classList.toggle('quiz-active',quizMode);
  if(quizMode){quizScore={c:0,w:0};updateQuizScore();nextQuiz();}
  else{render();}
}
function updateQuizScore(){
  document.getElementById('qCorrect').textContent=quizScore.c;
  document.getElementById('qWrong').textContent=quizScore.w;
}
let quizCorrectId=null;
function nextQuiz(){
  const pool=ALL_QUOTES;
  if(pool.length<4)return;
  quizIdx=Math.floor(Math.random()*pool.length);
  const q=pool[quizIdx];
  quizCorrectId=q.cid;
  document.getElementById('quizQuote').textContent='"'+(q[lang]||q.ru)+'"';
  document.getElementById('quizEra').textContent=
    (ERA_LABELS[q.era]||{})[lang]+' · '+(q.country[lang]||q.country.ru);
  document.getElementById('quizNext').classList.remove('show');
  // reset hint
  const hintBtn=document.getElementById('quizHintBtn');
  const hintBox=document.getElementById('quizHintBox');
  hintBtn.style.display='inline-flex';
  hintBtn.textContent=lang==='ru'?'💡 Подсказка':'💡 Hint';
  hintBox.style.display='none';
  hintBox.textContent='';

  const allComposers=[...new Set(DATA.map(c=>c.id))];
  const wrong=allComposers.filter(id=>id!==q.cid);
  const shuffled=wrong.sort(()=>Math.random()-.5).slice(0,3);
  const choices=[q.cid,...shuffled].sort(()=>Math.random()-.5);

  document.getElementById('quizChoices').innerHTML=choices.map(cid=>{
    const c=DATA.find(x=>x.id===cid);
    if(!c)return '';
    return `<button class="qc-btn" data-cid="${cid}" onclick="answerQuiz(this)">
      ${c.name[lang]||c.name.ru}<br><small style="opacity:.6">${c.dates}</small>
    </button>`;
  }).join('');
}
function showHint(){
  const q=ALL_QUOTES[quizIdx];
  const c=DATA.find(x=>x.id===q.cid);
  const hintBox=document.getElementById('quizHintBox');
  const name=c.name[lang]||c.name.ru;
  const initials=name.split(' ').map(w=>w[0]+'.').join(' ');
  const country=c.country[lang]||c.country.ru;
  hintBox.textContent=(lang==='ru'?'Подсказка: ':'Hint: ')+initials+' · '+country+' · '+c.dates;
  hintBox.style.display='block';
  document.getElementById('quizHintBtn').style.display='none';
}
function answerQuiz(btn){
  const chosen=btn.dataset.cid;
  const correct=quizCorrectId;
  document.querySelectorAll('.qc-btn').forEach(b=>{
    b.disabled=true;
    if(b.dataset.cid===correct)b.classList.add('correct');
    else if(b.dataset.cid===chosen&&chosen!==correct)b.classList.add('wrong');
  });
  if(chosen===correct){quizScore.c++;}else{quizScore.w++;}
  updateQuizScore();
  document.getElementById('quizNext').classList.add('show');
  document.getElementById('quizHintBtn').style.display='none';
  document.getElementById('quizHintBox').style.display='none';
  if(chosen===correct)setTimeout(nextQuiz,1400);
}

/* ─── FILTERS ───────────────────────────────────────────────────────── */
document.querySelectorAll('[data-filter]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const f=btn.dataset.filter, v=btn.dataset.val;
    document.querySelectorAll(`[data-filter="${f}"]`).forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if(f==='era')filterEra=v;
    else if(f==='origin')filterOrigin=v;
    else if(f==='theme')filterTheme=v;
    render();
  });
});
document.getElementById('searchInp').addEventListener('input',e=>{
  searchQ=e.target.value.trim();render();
});

  const dk=document.documentElement.getAttribute('data-theme')==='dark';
  document.getElementById('themeText').textContent=dk?(ru?'Светлая':'Light'):(ru?'Тёмная':'Dark');
  render();
  if(quizMode)nextQuiz();
}
document.getElementById('langBtn').addEventListener('click',()=>{
  lang=lang==='ru'?'en':'ru';
  localStorage.setItem('musicapp_lang',lang);
  document.getElementById('langText').textContent=lang==='ru'?'RU':'EN';
  applyLang();
});
document.getElementById('themeBtn').addEventListener('click',()=>{
  const dk=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',dk?'light':'dark');

  const ru=lang==='ru';
  document.getElementById('themeText').textContent=dk?(ru?'Тёмная':'Dark'):(ru?'Светлая':'Light');

applyLang();
