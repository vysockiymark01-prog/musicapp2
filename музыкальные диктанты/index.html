<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Музыкальные диктанты</title>
<script>(function(){var t=localStorage.getItem('musicapp_theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else document.documentElement.setAttribute('data-theme','light');})()</script>
<style>
:root{
  --bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#94a3b8;--border:#e2e8f0;
  --sl100:#f1f5f9;--sl200:#e2e8f0;--sl300:#cbd5e1;--sl400:#94a3b8;--sl500:#64748b;
  --sl600:#475569;--sl700:#334155;--sl800:#1e293b;--sl900:#0f172a;
  --blue:#2563eb;--blue2:#1d4ed8;--green:#16a34a;--red:#dc2626;--amber:#f59e0b;
  --shadow:0 1px 3px rgba(0,0,0,.06);
}
[data-theme="dark"]{
  --bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--muted:#64748b;--border:#334155;
  --sl100:#334155;--sl200:#334155;--sl300:#475569;--sl400:#64748b;--sl500:#94a3b8;
  --sl600:#cbd5e1;--sl700:#e2e8f0;--sl800:#475569;--sl900:#f1f5f9;
  --shadow:0 1px 3px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);user-select:none;transition:background .3s,color .3s;overflow-x:hidden;}
.wrap{max-width:920px;margin:0 auto;padding:12px;}

.hdr{display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;background:var(--card);border:1px solid var(--border);
  border-radius:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.hdr-title{font-weight:900;font-size:15px;letter-spacing:-.5px;}
.hdr-sub{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;}
.hdr-actions{display:flex;gap:6px;}
.hbtn{display:flex;align-items:center;gap:5px;padding:6px 11px;background:var(--sl100);
  border:none;border-radius:10px;font-weight:800;font-size:10px;text-transform:uppercase;
  cursor:pointer;color:var(--text);transition:background .2s;}
.hbtn:hover{background:var(--sl200);}

.grade-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.gtab{padding:7px 16px;border:2px solid var(--border);border-radius:20px;
  background:var(--card);font-size:11px;font-weight:800;cursor:pointer;
  color:var(--muted);transition:all .2s;}
.gtab.active{background:var(--blue);border-color:var(--blue);color:#fff;
  box-shadow:0 4px 10px rgba(37,99,235,.25);}

.main-tabs{display:flex;background:var(--card);padding:4px;border-radius:12px;
  border:1px solid var(--border);margin-bottom:12px;gap:2px;overflow-x:auto;}
.main-tabs::-webkit-scrollbar{display:none;}
.mtab{flex:0 0 auto;padding:9px 13px;border:none;background:none;border-radius:8px;
  font-size:10px;font-weight:900;text-transform:uppercase;color:var(--muted);
  cursor:pointer;transition:all .2s;white-space:nowrap;}
.mtab.active{background:var(--blue);color:#fff;}

.card{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:18px;margin-bottom:12px;box-shadow:var(--shadow);}

/* PLAY PANEL */
.play-panel{background:var(--sl800);border-radius:18px;padding:18px 16px;
  margin-bottom:12px;display:flex;flex-direction:column;align-items:center;gap:10px;}
[data-theme="dark"] .play-panel{background:#000;}
.play-label{font-size:10px;font-weight:900;text-transform:uppercase;
  color:rgba(255,255,255,.35);letter-spacing:2px;}
.play-main{font-size:18px;font-weight:900;color:#fff;text-align:center;}
.play-sub{font-size:12px;color:rgba(255,255,255,.5);text-align:center;}

/* CONTROLS ROW */
.ctrl-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;}
.play-btn{display:flex;align-items:center;gap:7px;padding:11px 22px;border:none;
  border-radius:14px;background:var(--blue);color:#fff;font-size:13px;font-weight:900;
  cursor:pointer;transition:all .15s;letter-spacing:.5px;}
.play-btn:hover{background:var(--blue2);}
.play-btn:disabled{background:var(--sl300);color:var(--sl500);cursor:default;}
.play-btn.playing{background:#7c3aed;}
.plays-left{font-size:11px;font-weight:800;color:rgba(255,255,255,.5);}

/* TEMPO */
.tempo-row{display:flex;align-items:center;gap:8px;}
.tempo-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.4);text-transform:uppercase;}
.tempo-slider{accent-color:var(--blue);width:100px;}
.tempo-val{font-size:11px;font-weight:800;color:rgba(255,255,255,.6);min-width:36px;}

/* STAFF */
.staff-area{background:#fff;border-radius:14px;padding:10px 14px;
  overflow-x:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
[data-theme="dark"] .staff-area{background:#0f172a;border:1px solid #334155;}
.staff-row{display:flex;align-items:center;gap:6px;}
.voice-label{font-size:9px;font-weight:900;text-transform:uppercase;
  color:var(--muted);writing-mode:vertical-rl;text-orientation:mixed;
  transform:rotate(180deg);min-width:14px;}

/* DURATION BUTTONS */
.dur-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;}
.dur-btn{width:44px;height:52px;border:2px solid var(--border);border-radius:12px;
  background:var(--card);cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;transition:all .15s;}
.dur-btn:hover{border-color:var(--blue);}
.dur-btn.active{border-color:var(--blue);background:var(--blue);color:#fff;}
.dur-btn svg{pointer-events:none;}
.dur-lbl{font-size:8px;font-weight:800;text-transform:uppercase;
  color:var(--muted);pointer-events:none;}
.dur-btn.active .dur-lbl{color:#fff;}

/* PIANO */
.piano-wrap{position:relative;display:inline-flex;margin-bottom:10px;}
.pk-w{width:32px;height:90px;background:#fff;border:1px solid #cbd5e1;
  border-top:none;border-radius:0 0 6px 6px;cursor:pointer;position:relative;
  z-index:1;display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:4px;font-size:8px;font-weight:700;color:#94a3b8;transition:background .1s;}
.pk-w:hover{background:#dbeafe;}
.pk-w.active{background:#60a5fa;color:#fff;}
.pk-w.dim{opacity:.35;cursor:default;}
.pk-b{width:20px;height:56px;background:#1e293b;border:2px solid #000;
  border-top:none;border-radius:0 0 5px 5px;box-shadow:0 4px 6px rgba(0,0,0,.4);
  cursor:pointer;position:absolute;z-index:2;top:0;
  display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px;
  font-size:7px;font-weight:700;color:rgba(255,255,255,.4);transition:background .1s;}
.pk-b:hover{background:#1e3a8a;}
.pk-b.active{background:#1d4ed8;}
.pk-b.dim{opacity:.35;cursor:default;}

/* ACTION BUTTONS */
.act-row{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;}
.act-btn{padding:9px 16px;border:1px solid var(--border);border-radius:10px;
  background:var(--card);color:var(--text);font-size:11px;font-weight:800;cursor:pointer;transition:all .15s;}
.act-btn:hover{border-color:var(--blue);}
.act-btn.primary{background:var(--blue);border-color:var(--blue);color:#fff;}
.act-btn.primary:hover{background:var(--blue2);}
.act-btn.danger{background:var(--red);border-color:var(--red);color:#fff;}
.act-btn:disabled{opacity:.4;cursor:default;}

/* SCORE */
.score-row{display:flex;justify-content:center;gap:28px;margin-bottom:12px;}
.sc{text-align:center;}
.sc-v{font-size:30px;font-weight:900;}
.sc-v.g{color:var(--green);}
.sc-v.r{color:var(--red);}
.sc-l{font-size:9px;font-weight:900;text-transform:uppercase;color:var(--muted);}

/* FEEDBACK */
.feedback{padding:11px 14px;border-radius:12px;font-size:13px;font-weight:700;
  text-align:center;margin:8px 0;}
.feedback.ok{background:#dcfce7;color:#166534;}
.feedback.err{background:#fee2e2;color:#991b1b;}
[data-theme="dark"] .feedback.ok{background:#166534;color:#bbf7d0;}
[data-theme="dark"] .feedback.err{background:#7f1d1d;color:#fecaca;}

/* METER CHOICES */
.meter-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-width:380px;margin:0 auto;}
.meter-btn{padding:18px 10px;border:2px solid var(--border);border-radius:14px;
  background:var(--card);font-size:22px;font-weight:900;cursor:pointer;
  text-align:center;transition:all .15s;}
.meter-btn:hover:not(:disabled){border-color:var(--blue);}
.meter-btn.correct{background:#dcfce7;border-color:var(--green);color:#166534;}
.meter-btn.wrong{background:#fee2e2;border-color:var(--red);color:#991b1b;}
[data-theme="dark"] .meter-btn.correct{background:#166534;color:#bbf7d0;}
[data-theme="dark"] .meter-btn.wrong{background:#7f1d1d;color:#fecaca;}
.meter-btn:disabled{cursor:default;}

/* ERROR NOTES */
.err-note{cursor:pointer;transition:opacity .15s;}
.err-note:hover{opacity:.7;}
.err-note.marked{fill:var(--amber) !important;}

/* VOICE TOGGLE */
.voice-toggle{display:flex;gap:6px;justify-content:center;margin-bottom:10px;}
.vtog{padding:7px 16px;border:2px solid var(--border);border-radius:20px;
  background:var(--card);font-size:11px;font-weight:800;cursor:pointer;
  color:var(--muted);transition:all .2s;}
.vtog.active{background:var(--blue);border-color:var(--blue);color:#fff;}

/* PROGRESS */
.progress-bar{height:4px;background:var(--sl200);border-radius:2px;margin-bottom:12px;overflow:hidden;}
.progress-fill{height:100%;background:var(--blue);transition:width .3s;}

/* HINT BOX */
.hint-box{background:var(--sl100);border-radius:10px;padding:10px 14px;
  font-size:12px;font-weight:700;color:var(--text);text-align:center;margin:6px 0;}
.piano-outer{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px;}
.piano-outer::-webkit-scrollbar{height:4px;}
.piano-outer::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
@media(max-width:640px){
  .hdr{flex-wrap:wrap;gap:8px;padding:10px 12px;}
  .hdr-actions{gap:4px;}
  .hbtn{padding:7px 9px;font-size:9px;}
  .wrap{padding:10px;}
  .grade-tabs{gap:4px;}
  .gtab{padding:6px 12px;font-size:10px;}
  .play-panel{padding:14px 10px;}
  .ctrl-row{gap:6px;}
  .tempo-slider{width:80px;}
  .meter-grid{grid-template-columns:repeat(2,1fr);max-width:100%;}
}
@media(max-width:400px){
  .hdr-title{font-size:13px;}
  .score-row{gap:16px;}
  .sc-v{font-size:26px;}
  .dur-btn{width:38px;height:46px;}
}
</style>
</head>
<body>
<div class="wrap">
<a href="../index.html" style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;text-decoration:none;opacity:.65;padding:5px 11px;border:1px solid rgba(128,128,128,.25);border-radius:10px;margin-bottom:8px;color:inherit;">← Главная</a>

<!-- HEADER -->
<div class="hdr">
  <div>
    <div class="hdr-title">🎵 <span id="hdrTitle">Музыкальные диктанты</span></div>
    <div class="hdr-sub" id="hdrSub">Слух · Нотация · Ритм</div>
  </div>
  <div class="hdr-actions">
    <button class="hbtn" id="themeBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIco">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <span id="themeText">Тёмная</span>
    </button>
    <button class="hbtn" id="langBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/>
        <path d="m22 22-5-10-5 10"/><path d="M14 18h6"/>
      </svg>
      <span id="langText">RU</span>
    </button>
  </div>
</div>

<!-- GRADE TABS -->
<div class="grade-tabs" id="gradeTabs">
  <button class="gtab active" data-g="1-2">1–2 класс</button>
  <button class="gtab" data-g="3-4">3–4 класс</button>
  <button class="gtab" data-g="5-6">5–6 класс</button>
  <button class="gtab" data-g="7-8">7–8 класс</button>
</div>

<!-- MAIN TABS -->
<div class="main-tabs" id="mainTabs">
  <button class="mtab active" data-t="melodic" id="mtab-melodic">🎵 Одноголосный</button>
  <button class="mtab" data-t="twovoice" id="mtab-twovoice">🎼 Двухголосный</button>
  <button class="mtab" data-t="rhythm" id="mtab-rhythm">🥁 Ритмический</button>
  <button class="mtab" data-t="errors" id="mtab-errors">🔍 С ошибками</button>
  <button class="mtab" data-t="meter" id="mtab-meter">⏱ Размер</button>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<!-- ═══════════════════════════════════════════ -->
<!-- MELODIC TAB                                -->
<!-- ═══════════════════════════════════════════ -->
<div id="tab-melodic">
  <div class="score-row">
    <div class="sc"><div class="sc-v g" id="mCorrect">0</div><div class="sc-l" id="mCLbl">Верно</div></div>
    <div class="sc"><div class="sc-v r" id="mWrong">0</div><div class="sc-l" id="mWLbl">Ошибки</div></div>
  </div>
  <div class="card">
    <div class="play-panel">
      <div class="play-label" id="mPlayLabel">Прослушай мелодию</div>
      <div class="play-main" id="mKeyName"></div>
      <div class="play-sub" id="mTimeSig"></div>
      <div class="ctrl-row">
        <button class="play-btn" id="mPlayBtn" onclick="playMelodic()">▶ <span id="mPlayTxt">Слушать</span></button>
        <div class="plays-left" id="mPlaysLeft"></div>
      </div>
      <div class="tempo-row">
        <span class="tempo-lbl" id="mTempoLbl">Темп</span>
        <input type="range" class="tempo-slider" id="mTempo" min="50" max="150" value="80">
        <span class="tempo-val" id="mTempoVal">80</span>
      </div>
    </div>
    <!-- Staff (generated melody hidden, user input shown) -->
    <div class="staff-area" id="mStaffArea"></div>
    <!-- Duration selector -->
    <div class="dur-row" id="mDurRow"></div>
    <!-- Piano -->
    <div style="display:flex;justify-content:center;overflow-x:auto;padding-bottom:4px;">
      <div class="piano-outer"><div class="piano-wrap" id="mPiano"></div></div>
    </div>
    <!-- Actions -->
    <div class="act-row">
      <button class="act-btn" id="mUndo" onclick="melodicUndo()">↩ <span id="mUndoTxt">Отменить</span></button>
      <button class="act-btn" id="mClear" onclick="melodicClear()">✕ <span id="mClearTxt">Очистить</span></button>
      <button class="act-btn" id="mHint" onclick="melodicHint()">💡 <span id="mHintTxt">Подсказка</span></button>
      <button class="act-btn primary" id="mCheck" onclick="checkMelodic()">✓ <span id="mCheckTxt">Проверить</span></button>
    </div>
    <div id="mHintBox" style="display:none" class="hint-box"></div>
    <div id="mFeedback"></div>
    <button class="act-btn primary" id="mNext" style="display:none;width:100%;margin-top:8px;" onclick="startMelodic()"><span id="mNextTxt">Следующий →</span></button>
  </div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- TWO-VOICE TAB                              -->
<!-- ═══════════════════════════════════════════ -->
<div id="tab-twovoice" style="display:none">
  <div class="score-row">
    <div class="sc"><div class="sc-v g" id="tvCorrect">0</div><div class="sc-l" id="tvCLbl">Верно</div></div>
    <div class="sc"><div class="sc-v r" id="tvWrong">0</div><div class="sc-l" id="tvWLbl">Ошибки</div></div>
  </div>
  <div class="card">
    <div class="play-panel">
      <div class="play-label" id="tvPlayLabel">Прослушай двухголосие</div>
      <div class="play-main" id="tvKeyName"></div>
      <div class="play-sub" id="tvTimeSig"></div>
      <div class="ctrl-row">
        <button class="play-btn" id="tvPlayBtn" onclick="playTwoVoice()">▶ <span id="tvPlayTxt">Слушать</span></button>
        <div class="plays-left" id="tvPlaysLeft"></div>
      </div>
      <div class="tempo-row">
        <span class="tempo-lbl" id="tvTempoLbl">Темп</span>
        <input type="range" class="tempo-slider" id="tvTempo" min="50" max="150" value="80">
        <span class="tempo-val" id="tvTempoVal">80</span>
      </div>
    </div>
    <div class="voice-toggle">
      <button class="vtog active" id="tvVoiceT" onclick="setTVVoice('treble')"><span id="tvVoiceTLbl">Верхний голос</span></button>
      <button class="vtog" id="tvVoiceB" onclick="setTVVoice('bass')"><span id="tvVoiceBLbl">Нижний голос</span></button>
    </div>
    <div class="staff-area" id="tvStaffArea"></div>
    <div class="dur-row" id="tvDurRow"></div>
    <div style="display:flex;justify-content:center;overflow-x:auto;padding-bottom:4px;">
      <div class="piano-outer"><div class="piano-wrap" id="tvPiano"></div></div>
    </div>
    <div class="act-row">
      <button class="act-btn" onclick="twoVoiceUndo()">↩ <span id="tvUndoTxt">Отменить</span></button>
      <button class="act-btn" onclick="twoVoiceClear()">✕ <span id="tvClearTxt">Очистить</span></button>
      <button class="act-btn" onclick="twoVoiceHint()">💡 <span id="tvHintTxt">Подсказка</span></button>
      <button class="act-btn primary" onclick="checkTwoVoice()">✓ <span id="tvCheckTxt">Проверить</span></button>
    </div>
    <div id="tvHintBox" style="display:none" class="hint-box"></div>
    <div id="tvFeedback"></div>
    <button class="act-btn primary" id="tvNext" style="display:none;width:100%;margin-top:8px;" onclick="startTwoVoice()"><span id="tvNextTxt">Следующий →</span></button>
  </div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- RHYTHM TAB                                 -->
<!-- ═══════════════════════════════════════════ -->
<div id="tab-rhythm" style="display:none">
  <div class="score-row">
    <div class="sc"><div class="sc-v g" id="rCorrect">0</div><div class="sc-l" id="rCLbl">Верно</div></div>
    <div class="sc"><div class="sc-v r" id="rWrong">0</div><div class="sc-l" id="rWLbl">Ошибки</div></div>
  </div>
  <div class="card">
    <div class="play-panel">
      <div class="play-label" id="rPlayLabel">Определи ритм</div>
      <div class="play-main" id="rTimeSig"></div>
      <div class="ctrl-row">
        <button class="play-btn" id="rPlayBtn" onclick="playRhythm()">▶ <span id="rPlayTxt">Слушать</span></button>
        <div class="plays-left" id="rPlaysLeft"></div>
      </div>
      <div class="tempo-row">
        <span class="tempo-lbl" id="rTempoLbl">Темп</span>
        <input type="range" class="tempo-slider" id="rTempo" min="50" max="150" value="90">
        <span class="tempo-val" id="rTempoVal">90</span>
      </div>
    </div>
    <div class="staff-area" id="rStaffArea"></div>
    <div class="dur-row" id="rDurRow"></div>
    <div class="act-row">
      <button class="act-btn" onclick="rhythmUndo()">↩ <span id="rUndoTxt">Отменить</span></button>
      <button class="act-btn" onclick="rhythmClear()">✕ <span id="rClearTxt">Очистить</span></button>
      <button class="act-btn primary" onclick="checkRhythm()">✓ <span id="rCheckTxt">Проверить</span></button>
    </div>
    <div id="rFeedback"></div>
    <button class="act-btn primary" id="rNext" style="display:none;width:100%;margin-top:8px;" onclick="startRhythm()"><span id="rNextTxt">Следующий →</span></button>
  </div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- ERRORS TAB                                 -->
<!-- ═══════════════════════════════════════════ -->
<div id="tab-errors" style="display:none">
  <div class="score-row">
    <div class="sc"><div class="sc-v g" id="eCorrect">0</div><div class="sc-l" id="eCLbl">Верно</div></div>
    <div class="sc"><div class="sc-v r" id="eWrong">0</div><div class="sc-l" id="eWLbl">Ошибки</div></div>
  </div>
  <div class="card">
    <div class="play-panel">
      <div class="play-label" id="ePlayLabel">Найди ошибки</div>
      <div class="play-main" id="eKeyName"></div>
      <div class="play-sub" id="eInstruct"></div>
      <div class="ctrl-row">
        <button class="play-btn" id="ePlayBtn" onclick="playErrors()">▶ <span id="ePlayTxt">Слушать</span></button>
      </div>
    </div>
    <div class="staff-area" id="eStaffArea"></div>
    <div class="hint-box" style="margin:6px 0;"><span id="eHintText">💡 Нажмите на ноту, чтобы пометить как ошибку</span></div>
    <div class="act-row">
      <button class="act-btn primary" onclick="checkErrors()">✓ <span id="eCheckTxt">Проверить</span></button>
    </div>
    <div id="eFeedback"></div>
    <button class="act-btn primary" id="eNext" style="display:none;width:100%;margin-top:8px;" onclick="startErrors()"><span id="eNextTxt">Следующий →</span></button>
  </div>

</div><!-- /wrap -->
<script>
/* ================================================================
   CONSTANTS & DATA
   ================================================================ */
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_RU={C:'До',D:'Ре',E:'Ми',F:'Фа',G:'Соль',A:'Ля',B:'Си',
  'C#':'До#','D#':'Ре#','F#':'Фа#','G#':'Соль#','A#':'Ля#'};
const FLAT_RU={'A#':'Си♭','D#':'Ми♭','G#':'Ля♭','C#':'Ре♭','F#':'Соль♭'};
const FLAT_EN={'A#':'Bb','D#':'Eb','G#':'Ab','C#':'Db','F#':'Gb'};

const MAJOR=[0,2,4,5,7,9,11];
const NAT_MIN=[0,2,3,5,7,8,10];
const HARM_MIN=[0,2,3,5,7,8,11];

const KEYS=[
  {ru:'До мажор',    en:'C major',   t:0,  signs:0,  mode:'major'},
  {ru:'Соль мажор',  en:'G major',   t:7,  signs:1, st:'#', mode:'major'},
  {ru:'Ре мажор',    en:'D major',   t:2,  signs:2, st:'#', mode:'major'},
  {ru:'Ля мажор',    en:'A major',   t:9,  signs:3, st:'#', mode:'major'},
  {ru:'Ми мажор',    en:'E major',   t:4,  signs:4, st:'#', mode:'major'},
  {ru:'Фа мажор',    en:'F major',   t:5,  signs:1, st:'b', mode:'major'},
  {ru:'Си♭ мажор',   en:'Bb major',  t:10, signs:2, st:'b', mode:'major'},
  {ru:'Ми♭ мажор',   en:'Eb major',  t:3,  signs:3, st:'b', mode:'major'},
  {ru:'Ля минор',    en:'A minor',   t:9,  signs:0,  mode:'minor'},
  {ru:'Ми минор',    en:'E minor',   t:4,  signs:1, st:'#', mode:'minor'},
  {ru:'Си минор',    en:'B minor',   t:11, signs:2, st:'#', mode:'minor'},
  {ru:'Ре минор',    en:'D minor',   t:2,  signs:1, st:'b', mode:'minor'},
  {ru:'Соль минор',  en:'G minor',   t:7,  signs:2, st:'b', mode:'minor'},
  {ru:'До минор',    en:'C minor',   t:0,  signs:3, st:'b', mode:'minor'},
];

const GRADE_CFG={
  '1-2':{maxSigns:1, bars:4, timeSigs:[2,3], durs:[1,2,4], minDur:1, piano:'treble', maxLeap:2},
  '3-4':{maxSigns:3, bars:4, timeSigs:[2,3,4], durs:[0.5,1,2,4], minDur:0.5, piano:'treble', maxLeap:4},
  '5-6':{maxSigns:5, bars:6, timeSigs:[2,3,4], durs:[0.5,1,1.5,2,4], minDur:0.5, piano:'both', maxLeap:5},
  '7-8':{maxSigns:7, bars:8, timeSigs:[2,3,4,6], durs:[0.5,1,1.5,2,3,4], minDur:0.5, piano:'both', maxLeap:7},
};

// Duration labels
const DUR_INFO=[
  {dur:4,   sym:'𝅝', labelRu:'Целая',   labelEn:'Whole'},
  {dur:2,   sym:'𝅗𝅥', labelRu:'Половин.', labelEn:'Half'},
  {dur:1.5, sym:'𝅗𝅥.', labelRu:'Пунктир', labelEn:'Dotted'},
  {dur:1,   sym:'♩', labelRu:'Четверть', labelEn:'Quarter'},
  {dur:0.5, sym:'♪', labelRu:'Восьмая',  labelEn:'Eighth'},
];

let lang=localStorage.getItem('musicapp_lang')||'ru', grade='1-2', tab='melodic';
let mScore={c:0,w:0}, tvScore={c:0,w:0}, rScore={c:0,w:0}, eScore={c:0,w:0}, mtScore={c:0,w:0};

/* ================================================================
   HELPERS
   ================================================================ */
function rand(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function isDark(){return document.documentElement.getAttribute('data-theme')==='dark';}
function getG(){return GRADE_CFG[grade];}
function notePC(midi){return((midi%12)+12)%12;}
function midiNoteName(midi){return NOTES[notePC(midi)];}
function noteName(midi,key){
  const n=midiNoteName(midi);
  if(key&&key.st==='b'&&(lang==='ru'?FLAT_RU:FLAT_EN)[n])
    return (lang==='ru'?FLAT_RU:FLAT_EN)[n];
  return lang==='ru'?(NOTE_RU[n]||n):n;
}
function getScale(t,mode){
  const pat=mode==='major'?MAJOR:mode==='minor'?NAT_MIN:HARM_MIN;
  return pat.map(i=>(t+i)%12);
}
function allowedKeys(){
  const g=getG();
  return KEYS.filter(k=>k.signs<=g.maxSigns);
}

/* ================================================================
   AUDIO ENGINE
   ================================================================ */
let ctx=null;
function getCtx(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;}
function midiToFreq(m){return 440*Math.pow(2,(m-69)/12);}

function playTone(freq,start,dur,vol=0.16,wave='triangle'){
  const c=getCtx();
  const osc=c.createOscillator(), gain=c.createGain();
  osc.connect(gain); gain.connect(c.destination);
  osc.type=wave; osc.frequency.value=freq;
  const t=c.currentTime+start;
  gain.gain.setValueAtTime(0,t);
  gain.gain.linearRampToValueAtTime(vol,t+0.02);
  gain.gain.setValueAtTime(vol,t+dur-0.05);
  gain.gain.linearRampToValueAtTime(0,t+dur);
  osc.start(t); osc.stop(t+dur);
}

function playMelodyAudio(notes,tempo,vol=0.16){
  const beatSec=60/tempo;
  let t=0;
  notes.forEach(n=>{
    const dur=n.dur*beatSec*0.9;
    playTone(midiToFreq(n.midi),t,dur,vol);
    t+=n.dur*beatSec;
  });
  return t;
}

function playClick(tempo,beats){
  const beatSec=60/tempo;
  for(let i=0;i<beats;i++){
    playTone(880,i*beatSec,0.05,0.08,'square');
  }
}

let stopPlaying=false;

/* ================================================================
   MELODY GENERATOR
   ================================================================ */
function generateMelody(key,g,clef){
  const scale=getScale(key.t, key.mode==='minor'?(Math.random()>.4?'minor':'harmMin'):'major');
  const timeSig=rand(g.timeSigs);
  const totalBeats=g.bars*timeSig;
  
  // Strict MIDI range: treble C4-F5 (slots -2..8), bass G2-A3 (slots 0..8)
  const [mLow,mHigh]=clef==='bass'?[43,57]:[60,77];
  
  // Build diatonic scale within range
  const scaleMidi=[];
  for(let m=mLow;m<=mHigh;m++){
    if(scale.includes(notePC(m))) scaleMidi.push(m);
  }
  if(!scaleMidi.length) return{notes:[{midi:mLow,dur:timeSig}],timeSig,key};
  
  const notes=[];
  let beats=0, idx=Math.floor(scaleMidi.length/2);
  
  while(beats<totalBeats){
    const beatsLeft=totalBeats-beats;
    // d<=timeSig prevents whole note in 3/4, etc.
    const avail=g.durs.filter(d=>d<=beatsLeft&&d>=g.minDur&&d<=timeSig);
    if(!avail.length)break;
    const dur=rand(avail);
    
    const step=rand([-2,-1,-1,-1,0,0,1,1,1,2].filter(s=>Math.abs(s)<=g.maxLeap));
    idx=Math.max(0,Math.min(scaleMidi.length-1,idx+step));
    
    notes.push({midi:scaleMidi[idx],dur});
    beats+=dur;
  }
  
  // End on tonic near middle of range
  if(notes.length>0){
    const tonics=scaleMidi.filter(m=>notePC(m)===key.t);
    if(tonics.length) notes[notes.length-1].midi=tonics[Math.floor(tonics.length/2)];
    notes[notes.length-1].dur=Math.min(timeSig,timeSig>=4?2:timeSig);
  }
  
  return{notes,timeSig,key};
}

function generateWithErrors(key,g){
  const base=generateMelody(key,g,'treble');
  const errNotes=base.notes.map((n,i)=>({...n,idx:i,hasError:false}));
  const errCount=Math.min(3,Math.max(1,Math.floor(errNotes.length*0.25)));
  const candidates=shuffle([...Array(errNotes.length).keys()].slice(1,-1));
  const scale=getScale(key.t,key.mode==='minor'?'minor':'major');
  const scaleMidi=scale.map(pc=>{let m=60;while(notePC(m)!==pc)m++;return m;});
  
  for(let i=0;i<errCount&&i<candidates.length;i++){
    const idx=candidates[i];
    const orig=errNotes[idx].midi;
    let newMidi=orig;
    while(newMidi===orig)newMidi=orig+(rand([-2,-1,1,2]));
    errNotes[idx]={...errNotes[idx],midi:newMidi,hasError:true,correctMidi:orig};
  }
  return{...base,notes:errNotes};
}

/* ================================================================
   STAFF RENDERER
   ================================================================ */
const NAT_SLOT={C:0,D:1,E:2,F:3,G:4,A:5,B:6};
const PC_NAT=[
  {n:'C',a:null},{n:'C',a:'#'},{n:'D',a:null},{n:'D',a:'#'},{n:'E',a:null},
  {n:'F',a:null},{n:'F',a:'#'},{n:'G',a:null},{n:'G',a:'#'},{n:'A',a:null},
  {n:'A',a:'#'},{n:'B',a:null}
];

function midiToSlot(midi,clef){
  const oct=Math.floor(midi/12)-1;
  const pc=midi%12;
  const {n,a}=PC_NAT[pc];
  if(clef==='treble')return(oct-4)*7+NAT_SLOT[n]-2;
  return(oct-2)*7+NAT_SLOT[n]-4; // bass: G2=slot0
}

function drawNoteHead(svg,x,y,dur,nc,filled){
  const f=filled?nc:'none';
  svg+=`<ellipse cx="${x+5}" cy="${y}" rx="6.5" ry="4.5" fill="${f}" stroke="${nc}" stroke-width="1.3" transform="rotate(-15,${x+5},${y})"/>`;
  return svg;
}

function drawNoteSVG(x,y,dur,nc,SP){
  let s='';
  const filled=dur<2;
  // note head
  s+=`<ellipse cx="${x+5}" cy="${y}" rx="6.5" ry="4.5" fill="${filled?nc:'none'}" stroke="${nc}" stroke-width="1.3" transform="rotate(-15,${x+5},${y})"/>`;
  // stem (all up)
  if(dur<4)s+=`<line x1="${x+11}" y1="${y}" x2="${x+11}" y2="${y-SP*3.2}" stroke="${nc}" stroke-width="1.6"/>`;
  // flag/beam for eighth
  if(dur===0.5)s+=`<path d="M${x+11},${y-SP*3.2} C${x+22},${y-SP*2.5} ${x+20},${y-SP*2} ${x+11},${y-SP*2}" stroke="${nc}" stroke-width="1.6" fill="none"/>`;
  // dot for dotted notes
  if(dur===1.5||dur===3)s+=`<circle cx="${x+19}" cy="${y}" r="2.5" fill="${nc}"/>`;
  // augmentation dot on whole note
  return s;
}

function drawStaffSVG(notes,clef,timeSig,keyInfo,opts={}){
  const {userNotes=null,errorIdxs=[],markedIdxs=[],showCorrect=false}=opts;
  const SP=9,TOP=18;
  const CLEF_W=clef==='bass'?38:48;
  const KEYSIG_W=(keyInfo?keyInfo.signs:0)*13+6;
  const TIMESIG_W=28;
  const BAR_W=100;
  const bars=timeSig?Math.ceil(notes.reduce((s,n)=>s+n.dur,0)/timeSig)||4:4;
  const CONTENT_X=CLEF_W+KEYSIG_W+TIMESIG_W;
  const W=CONTENT_X+bars*BAR_W+16;
  const H=TOP+SP*4+34;
  const dk=isDark();
  const sc=dk?'#94a3b8':'#475569'; // staff color
  const nc=dk?'#f1f5f9':'#1e293b'; // note color
  const ac=dk?'#fbbf24':'#d97706'; // accidental color

  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="min-width:${W}px">`;
  // Staff lines
  for(let i=0;i<5;i++)
    svg+=`<line x1="0" y1="${TOP+i*SP}" x2="${W}" y2="${TOP+i*SP}" stroke="${sc}" stroke-width="1.2"/>`;

  // Clef
  const clefY=TOP+SP*4-2;
  if(clef==='treble')
    svg+=`<text x="4" y="${clefY}" font-size="52" font-family="serif" fill="${nc}">𝄞</text>`;
  else
    svg+=`<text x="3" y="${TOP+SP*3+4}" font-size="32" font-family="serif" fill="${nc}">𝄢</text>`;

  // Key signature
  const sharpNotes=[5,0,7,2,9,4,11]; // F C G D A E B (PCs)
  const flatNotes=[11,4,9,2,7,0,5];
  const sharpOff=[8,5,9,6,3,7,4]; // treble: F# C# G# D# A# E# B#
  const sharpOffB=[6,3,7,4,1,5,2]; // bass: F# C# G# D# A# E# B#
  const flatOff=[4,7,3,6,2,5,1]; // treble: Bb Eb Ab Db Gb Cb Fb
  const flatOffB=[2,5,1,4,0,3,6]; // bass: Bb Eb Ab Db Gb Cb Fb
  if(keyInfo&&keyInfo.signs>0){
    for(let i=0;i<keyInfo.signs;i++){
      const cx=CLEF_W+i*13+4;
      if(keyInfo.st==='#'){
        const sy=TOP+SP*4-((clef==='treble'?sharpOff:sharpOffB)[i]||2)*(SP/2);
        svg+=`<text x="${cx}" y="${sy+5}" font-size="16" font-family="serif" font-weight="bold" fill="${nc}">♯</text>`;
      } else {
        const sy=TOP+SP*4-((clef==='treble'?flatOff:flatOffB)[i]||2)*(SP/2);
        svg+=`<text x="${cx}" y="${sy+5}" font-size="18" font-family="serif" fill="${nc}">♭</text>`;
      }
    }
  }

  // Time signature
  const tsX=CLEF_W+KEYSIG_W+2;
  svg+=`<text x="${tsX+3}" y="${TOP+SP*2}" font-size="20" font-family="serif" font-weight="bold" fill="${nc}" text-anchor="middle">${timeSig||4}</text>`;
  svg+=`<text x="${tsX+3}" y="${TOP+SP*4}" font-size="20" font-family="serif" font-weight="bold" fill="${nc}" text-anchor="middle">4</text>`;

  // Bar lines
  for(let b=0;b<=bars;b++)
    svg+=`<line x1="${CONTENT_X+b*BAR_W}" y1="${TOP}" x2="${CONTENT_X+b*BAR_W}" y2="${TOP+SP*4}" stroke="${sc}" stroke-width="1.5"/>`;
  // Final double bar
  svg+=`<line x1="${CONTENT_X+bars*BAR_W+3}" y1="${TOP}" x2="${CONTENT_X+bars*BAR_W+3}" y2="${TOP+SP*4}" stroke="${sc}" stroke-width="3"/>`;

  // Draw notes
  const drawList=userNotes||notes;
  let beatPos=0;
  drawList.forEach((note,i)=>{
    if(!note||!note.midi)return;
    const bar=timeSig?Math.floor(beatPos/timeSig):0;
    const beatInBar=timeSig?beatPos%timeSig:0;
    const x=CONTENT_X+bar*BAR_W+(beatInBar/timeSig)*BAR_W+4;
    const slot=midiToSlot(note.midi,clef);
    const y=TOP+SP*4-slot*(SP/2);

    // Ledger lines
    if(slot<=-2){
      for(let s=0;s>=slot;s-=2){
        if(s%2===0&&s<0){const ly=TOP+SP*4-s*(SP/2);svg+=`<line x1="${x-8}" y1="${ly}" x2="${x+22}" y2="${ly}" stroke="${sc}" stroke-width="1.5"/>`;}
      }
    } else if(slot>=10){
      for(let s=10;s<=slot;s+=2){const ly=TOP+SP*4-s*(SP/2);svg+=`<line x1="${x-8}" y1="${ly}" x2="${x+22}" y2="${ly}" stroke="${sc}" stroke-width="1.5"/>`;}
    }

    // Note color
    let color=nc;
    let isError=false;
    if(errorIdxs.includes(i))color=markedIdxs.includes(i)?'#f59e0b':nc;
    if(showCorrect&&note.hasError)color='#dc2626';

    // Accidental (if note has accidental AND not covered by key sig)
    const {a}=PC_NAT[notePC(note.midi)];
    const inKeySig=keyInfo&&keyInfo.signs>0&&(
      keyInfo.st==='#'?sharpNotes.slice(0,keyInfo.signs).includes(notePC(note.midi)):
      flatNotes.slice(0,keyInfo.signs).includes(notePC(note.midi))
    );
    if(a&&!inKeySig){
      const accSym=a==='#'?'♯':'♭';
      const fsize=a==='#'?15:18;
      svg+=`<text x="${x-14}" y="${y+5}" font-size="${fsize}" font-family="serif" font-weight="bold" fill="${ac}">${accSym}</text>`;
    }

    // Note head + stem + flag
    const filled=note.dur<2;
    const stemUp=slot<=4;
    svg+=`<ellipse cx="${x+5}" cy="${y}" rx="6.5" ry="4.5" fill="${filled?color:'none'}" stroke="${color}" stroke-width="1.3" transform="rotate(-15,${x+5},${y})"`;
    if(errorIdxs.includes(i))svg+=` class="err-note${markedIdxs.includes(i)?' marked':''}" data-idx="${i}" onclick="toggleErrorMark(${i})"`;
    svg+='/>';
    if(note.dur<4){
      if(stemUp){
        svg+=`<line x1="${x+11}" y1="${y}" x2="${x+11}" y2="${y-SP*3.2}" stroke="${color}" stroke-width="1.6"/>`;
        if(note.dur===0.5)svg+=`<path d="M${x+11},${y-SP*3.2} C${x+22},${y-SP*2.5} ${x+20},${y-SP*2} ${x+11},${y-SP*2}" stroke="${color}" stroke-width="1.6" fill="none"/>`;
      } else {
        svg+=`<line x1="${x-1}" y1="${y}" x2="${x-1}" y2="${y+SP*3.2}" stroke="${color}" stroke-width="1.6"/>`;
        if(note.dur===0.5)svg+=`<path d="M${x-1},${y+SP*3.2} C${x+10},${y+SP*2.5} ${x+8},${y+SP*2} ${x-1},${y+SP*2}" stroke="${color}" stroke-width="1.6" fill="none"/>`;
      }
    }
    if(note.dur===1.5||note.dur===3)
      svg+=`<circle cx="${x+19}" cy="${y}" r="2.5" fill="${color}"/>`;

    beatPos+=note.dur;
  });

  svg+='</svg>';
  return svg;
}

function renderStaffArea(elId,notes,clef,timeSig,keyInfo,opts={}){
  const el=document.getElementById(elId);
  if(!el)return;
  el.innerHTML=drawStaffSVG(notes,clef,timeSig,keyInfo,opts);
}

/* ================================================================
   PIANO RENDERER
   ================================================================ */
const WHITE_NOTES=['C','D','E','F','G','A','B'];
function renderPiano(elId,clickFn,activeMidis=[],octMin=4,octMax=5){
  const el=document.getElementById(elId);if(!el)return;
  const whites=[];
  for(let oct=octMin;oct<=octMax;oct++){
    WHITE_NOTES.forEach(n=>{
      const pc=NOTES.indexOf(n);
      whites.push({n,oct,midi:12*(oct+1)+pc});
    });
  }
  let html='<div style="position:relative;display:inline-flex;">';
  whites.forEach(({n,oct,midi},wi)=>{
    const hl=activeMidis.includes(midi);
    html+=`<div class="pk-w${hl?' active':''}" onclick="${clickFn}(${midi})" style="margin-right:1px;">`;
    html+=`<span style="font-size:7px;color:${hl?'#fff':'#94a3b8'}">${n}${oct}</span></div>`;
  });
  // Black keys
  const blackDef=[];
  for(let oct=octMin;oct<=octMax;oct++){
    const bns=['C#','D#','F#','G#','A#'];
    bns.forEach(n=>{
      const pc=NOTES.indexOf(n);
      const wOct=oct-octMin;
      const wNidx=WHITE_NOTES.indexOf(n[0])+wOct*7;
      const offsets={C:0,D:1,F:3,G:4,A:5};
      const left=(offsets[n[0]]+wOct*7)*33+20;
      blackDef.push({n,oct,midi:12*(oct+1)+pc,left});
    });
  }
  blackDef.forEach(({n,oct,midi,left})=>{
    const hl=activeMidis.includes(midi);
    html+=`<div class="pk-b${hl?' active':''}" style="left:${left}px;" onclick="${clickFn}(${midi})"></div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

/* ================================================================
   DURATION BUTTONS
   ================================================================ */
function renderDurBtns(elId,activeDur,availDurs,clickFn){
  const el=document.getElementById(elId);if(!el)return;
  el.innerHTML=DUR_INFO.filter(d=>availDurs.includes(d.dur)).map(d=>
    `<button class="dur-btn${d.dur===activeDur?' active':''}" onclick="${clickFn}(${d.dur})">
      <svg width="20" height="28" viewBox="0 0 20 28">
        ${d.dur>=4?'<ellipse cx="10" cy="16" rx="7" ry="5" fill="none" stroke="currentColor" stroke-width="2" transform="rotate(-15,10,16)"/>':''}
        ${d.dur===2||d.dur===1.5?'<ellipse cx="10" cy="16" rx="7" ry="5" fill="none" stroke="currentColor" stroke-width="2" transform="rotate(-15,10,16)"/><line x1="17" y1="16" x2="17" y2="2" stroke="currentColor" stroke-width="2"/>':''}
        ${d.dur===1||d.dur===0.5?'<ellipse cx="10" cy="16" rx="7" ry="5" fill="currentColor" transform="rotate(-15,10,16)"/><line x1="17" y1="16" x2="17" y2="2" stroke="currentColor" stroke-width="2"/>':''}
        ${d.dur===0.5?'<path d="M17,2 C25,5 23,9 17,9" stroke="currentColor" stroke-width="2" fill="none"/>':''}
        ${d.dur===1.5||d.dur===3?'<circle cx="19" cy="16" r="2.5" fill="currentColor"/>':''}
      </svg>
      <span class="dur-lbl">${lang==='ru'?d.labelRu:d.labelEn}</span>
    </button>`
  ).join('');
}

function setMDur(d){

let mPlayTimeout=null;
function playMelodic(){

  btn.classList.add('playing');
  btn.disabled=true;
  
  // Count-in beats
  const beatSec=60/tempo;
  const ts=mEx.timeSig;
  for(let i=0;i<ts;i++) playTone(i===0?880:660,i*beatSec,0.04,0.09,'square');
  
  setTimeout(()=>{

    const remaining=mPlaysLeft;
    document.getElementById('mPlaysLeft').textContent=

function mPianoClick(midi){
  if(mChecked)return;
  const totalDur=mInput.reduce((s,n)=>s+n.dur,0);

  if(totalDur>=maxDur)return;
  mInput.push({midi,dur:mDur});
  playTone(midiToFreq(midi),0,0.4,0.15);
  renderStaffArea('mStaffArea',mInput,'treble',mEx.timeSig,mEx.key,{userNotes:mInput});
  renderPiano('mPiano','mPianoClick',[],4,5);
}

function melodicUndo(){
  if(!mInput.length||mChecked)return;
  mInput.pop();
  renderStaffArea('mStaffArea',mInput,'treble',mEx.timeSig,mEx.key,{userNotes:mInput});
}
function melodicClear(){
  if(mChecked)return;
  mInput=[];
  renderStaffArea('mStaffArea',[],'treble',mEx.timeSig,mEx.key);
}
function melodicHint(){
  if(!mEx)return;
  const firstNote=noteName(mEx.notes[0].midi,mEx.key);
  const el=document.getElementById('mHintBox');
  el.style.display='block';
  el.textContent=(lang==='ru'?'Первая нота: ':'First note: ')+firstNote;

function checkMelodic(){
  if(!mEx||!mInput.length)return;
  mChecked=true;
  document.getElementById('mCheck').disabled=true;
  
  // Compare pitch classes and durations
  const target=mEx.notes;
  let correct=0, total=target.length;
  for(let i=0;i<Math.min(mInput.length,target.length);i++){
    if(notePC(mInput[i].midi)===notePC(target[i].midi)&&mInput[i].dur===target[i].dur)correct++;
    else if(notePC(mInput[i].midi)===notePC(target[i].midi))correct+=0.5;
  }
  
  const pct=Math.round(correct/total*100);
  const isGood=pct>=75;
  
  if(isGood){
    mScore.c++;
    document.getElementById('mCorrect').textContent=mScore.c;
    document.getElementById('mFeedback').innerHTML=
      `<div class="feedback ok">✓ ${lang==='ru'?`Отлично! ${pct}% совпадений`:`Great! ${pct}% correct`}</div>`;
    // Show correct melody
    setTimeout(()=>{
      renderStaffArea('mStaffArea',target,'treble',mEx.timeSig,mEx.key);
    },300);
    setTimeout(startMelodic,2000);
  } else {
    mScore.w++;
    document.getElementById('mWrong').textContent=mScore.w;
    document.getElementById('mFeedback').innerHTML=
      `<div class="feedback err">✗ ${lang==='ru'?`${pct}% совпадений. Вот правильная мелодия:`:`${pct}% correct. Here's the melody:`}</div>`;
    renderStaffArea('mStaffArea',target,'treble',mEx.timeSig,mEx.key);
    playMelodyAudio(target,+document.getElementById('mTempo').value*0.8);
    document.getElementById('mNext').style.display='block';
  }
}

let eEx=null, eMarked=[], eChecked=false;

function startErrors(){
  eChecked=false;eMarked=[];
  const g=getG();
  const key=rand(allowedKeys());
  eEx=generateWithErrors(key,g);
  
  document.getElementById('eKeyName').textContent=key[lang];
  const errCount=eEx.notes.filter(n=>n.hasError).length;
  document.getElementById('eInstruct').textContent=lang==='ru'?
    `Найди ${errCount} ошибк${errCount===1?'у':errCount<5?'и':''}. Нажми на неверные ноты.`:
    `Find ${errCount} error${errCount>1?'s':''}. Click the wrong notes.`;
  document.getElementById('eFeedback').innerHTML='';
  document.getElementById('eNext').style.display='none';
  
  renderErrorStaff();
  document.getElementById('ePlayBtn').disabled=false;
}

function renderErrorStaff(){
  const el=document.getElementById('eStaffArea');
  if(!el)return;
  const k=eEx.key,ts=eEx.timeSig,notes=eEx.notes;
  const SP=9,TOP=18,CLEF_W=48,KEYSIG_W=(k.signs||0)*13+6,TIMESIG_W=28;
  const BAR_W=100;
  const bars=Math.ceil(notes.reduce((s,n)=>s+n.dur,0)/ts)||4;
  const CONTENT_X=CLEF_W+KEYSIG_W+TIMESIG_W;
  const W=CONTENT_X+bars*BAR_W+16, H=TOP+SP*4+34;
  const dk=isDark();
  const sc=dk?'#94a3b8':'#475569',nc=dk?'#f1f5f9':'#1e293b',ac=dk?'#fbbf24':'#d97706';
  
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="min-width:${W}px">`;
  for(let i=0;i<5;i++)svg+=`<line x1="0" y1="${TOP+i*SP}" x2="${W}" y2="${TOP+i*SP}" stroke="${sc}" stroke-width="1.2"/>`;
  svg+=`<text x="4" y="${TOP+SP*4-2}" font-size="52" font-family="serif" fill="${nc}">𝄞</text>`;
  // key sig
  const sharpOff=[8,5,9,6,3,7,4];const flatOff=[4,7,3,6,2,5,1];
  if(k&&k.signs>0)for(let i=0;i<k.signs;i++){
    const cx=CLEF_W+i*13+4;
    if(k.st==='#'){const sy=TOP+SP*4-(sharpOff[i]||2)*(SP/2);svg+=`<text x="${cx}" y="${sy+5}" font-size="16" font-family="serif" font-weight="bold" fill="${nc}">♯</text>`;}
    else{const sy=TOP+SP*4-(flatOff[i]||2)*(SP/2);svg+=`<text x="${cx}" y="${sy+5}" font-size="18" font-family="serif" fill="${nc}">♭</text>`;}
  }
  const tsX=CLEF_W+KEYSIG_W+2;
  svg+=`<text x="${tsX+3}" y="${TOP+SP*2}" font-size="20" font-family="serif" font-weight="bold" fill="${nc}" text-anchor="middle">${ts}</text>`;
  svg+=`<text x="${tsX+3}" y="${TOP+SP*4}" font-size="20" font-family="serif" font-weight="bold" fill="${nc}" text-anchor="middle">4</text>`;
  for(let b=0;b<=bars;b++)svg+=`<line x1="${CONTENT_X+b*BAR_W}" y1="${TOP}" x2="${CONTENT_X+b*BAR_W}" y2="${TOP+SP*4}" stroke="${sc}" stroke-width="1.5"/>`;
  svg+=`<line x1="${CONTENT_X+bars*BAR_W+3}" y1="${TOP}" x2="${CONTENT_X+bars*BAR_W+3}" y2="${TOP+SP*4}" stroke="${sc}" stroke-width="3"/>`;
  
  let beatPos=0;
  notes.forEach((note,i)=>{
    const bar=Math.floor(beatPos/ts),bib=beatPos%ts;
    const x=CONTENT_X+bar*BAR_W+(bib/ts)*BAR_W+4;
    const slot=midiToSlot(note.midi,'treble');
    const y=TOP+SP*4-slot*(SP/2);
    // ledger
    if(slot<=-2)for(let s=0;s>=slot;s-=2){if(s%2===0&&s<0){const ly=TOP+SP*4-s*(SP/2);svg+=`<line x1="${x-8}" y1="${ly}" x2="${x+22}" y2="${ly}" stroke="${sc}" stroke-width="1.5"/>`;}}
    else if(slot>=10)for(let s=10;s<=slot;s+=2){const ly=TOP+SP*4-s*(SP/2);svg+=`<line x1="${x-8}" y1="${ly}" x2="${x+22}" y2="${ly}" stroke="${sc}" stroke-width="1.5"/>`;}
    
    // accidental
    const {a}=PC_NAT[notePC(note.midi)];
    if(a){svg+=`<text x="${x-14}" y="${y+5}" font-size="16" font-family="serif" font-weight="bold" fill="${ac}">${a==='#'?'♯':'♭'}</text>`;}
    
    const marked=eChecked?(note.hasError?'#dc2626':'#16a34a'):(eMarked.includes(i)?'#f59e0b':nc);
    const filled=note.dur<2;
    const clickable=!eChecked;
    
    svg+=`<g ${clickable?`onclick="toggleEMark(${i})" style="cursor:pointer"`:''}>`;
    svg+=`<ellipse cx="${x+5}" cy="${y}" rx="7.5" ry="6" fill="transparent"/>`;  // hit area
    svg+=`<ellipse cx="${x+5}" cy="${y}" rx="6.5" ry="4.5" fill="${filled?marked:'none'}" stroke="${marked}" stroke-width="${eMarked.includes(i)?2.5:1.3}" transform="rotate(-15,${x+5},${y})"/>`;
    const stemUp=slot<=4;
    if(note.dur<4){
      if(stemUp){
        svg+=`<line x1="${x+11}" y1="${y}" x2="${x+11}" y2="${y-SP*3.2}" stroke="${marked}" stroke-width="1.6"/>`;
        if(note.dur===0.5)svg+=`<path d="M${x+11},${y-SP*3.2} C${x+22},${y-SP*2.5} ${x+20},${y-SP*2} ${x+11},${y-SP*2}" stroke="${marked}" stroke-width="1.6" fill="none"/>`;
      } else {
        svg+=`<line x1="${x-1}" y1="${y}" x2="${x-1}" y2="${y+SP*3.2}" stroke="${marked}" stroke-width="1.6"/>`;
        if(note.dur===0.5)svg+=`<path d="M${x-1},${y+SP*3.2} C${x+10},${y+SP*2.5} ${x+8},${y+SP*2} ${x-1},${y+SP*2}" stroke="${marked}" stroke-width="1.6" fill="none"/>`;
      }
    }
    if(note.dur===1.5)svg+=`<circle cx="${x+19}" cy="${y}" r="2.5" fill="${marked}"/>`;
    svg+='</g>';
    
    beatPos+=note.dur;
  });
  svg+='</svg>';
  el.innerHTML=svg;
}

function toggleEMark(i){
  if(eChecked)return;
  const idx=eMarked.indexOf(i);
  if(idx>=0)eMarked.splice(idx,1);else eMarked.push(i);
  renderErrorStaff();
}

function playErrors(){
  if(!eEx)return;
  // Play the CORRECT version
  const correctNotes=eEx.notes.map(n=>({...n,midi:n.hasError?n.correctMidi:n.midi}));
  playMelodyAudio(correctNotes,80);
}

function checkErrors(){
  if(!eEx)return;
  eChecked=true;
  const errorIdxs=eEx.notes.map((n,i)=>n.hasError?i:-1).filter(i=>i>=0);
  const truePositives=eMarked.filter(i=>errorIdxs.includes(i)).length;
  const falsePositives=eMarked.filter(i=>!errorIdxs.includes(i)).length;
  const correct=truePositives===errorIdxs.length&&falsePositives===0;
  
  renderErrorStaff(); // shows green/red based on eChecked
  
  if(correct){
    eScore.c++;document.getElementById('eCorrect').textContent=eScore.c;
    document.getElementById('eFeedback').innerHTML=`<div class="feedback ok">✓ ${lang==='ru'?'Все ошибки найдены!':'All errors found!'}</div>`;
    setTimeout(startErrors,2000);
  } else {
    eScore.w++;document.getElementById('eWrong').textContent=eScore.w;
    document.getElementById('eFeedback').innerHTML=`<div class="feedback err">✗ ${lang==='ru'?`Верно: ${truePositives}/${errorIdxs.length}, лишних: ${falsePositives}`:`Correct: ${truePositives}/${errorIdxs.length}, false: ${falsePositives}`}</div>`;
    document.getElementById('eNext').style.display='block';
  }
}

/* ================================================================
   METER DICTATION
   ================================================================ */
let mtEx=null, mtChecked=false;

function startMeter(){
  mtChecked=false;
  const g=getG();
  const key=rand(allowedKeys());
  mtEx=generateMelody(key,g,'treble');
  
  document.getElementById('mtKeyName').textContent='';
  document.getElementById('mtFeedback').innerHTML='';
  document.getElementById('mtNext').style.display='none';
  document.getElementById('mtPlayBtn').disabled=false;
  
  // Generate answer choices
  const allTs=[2,3,4,6].filter(t=>t!==mtEx.timeSig);
  const wrongs=shuffle(allTs).slice(0,Math.min(3,allTs.length));
  const choices=shuffle([mtEx.timeSig,...wrongs]);
  
  document.getElementById('meterChoices').innerHTML=choices.map(t=>
    `<button class="meter-btn" onclick="checkMeter(${t})">${t}<span style="font-size:14px">/4</span></button>`
  ).join('');
}

function playMeter(){
  if(!mtEx)return;
  const tempo=+document.getElementById('mtTempo').value;
  const btn=document.getElementById('mtPlayBtn');
  btn.classList.add('playing');btn.disabled=true;
  // Play click intro
  const beatSec=60/tempo;
  for(let i=0;i<mtEx.timeSig*2;i++)
    playTone(i%mtEx.timeSig===0?660:440,i*beatSec,0.05,0.08,'square');
  const intro=mtEx.timeSig*2*beatSec;
  setTimeout(()=>{
    const dur=playMelodyAudio(mtEx.notes,tempo);
    setTimeout(()=>{btn.classList.remove('playing');btn.disabled=false;},(dur+0.3)*1000);
  },intro*1000+100);
}

function checkMeter(choice){
  if(mtChecked)return;
  mtChecked=true;
  document.querySelectorAll('.meter-btn').forEach(b=>b.disabled=true);
  const correct=choice===mtEx.timeSig;
  document.querySelectorAll('.meter-btn').forEach(b=>{
    const v=parseInt(b.textContent);
    if(v===mtEx.timeSig)b.classList.add('correct');
    else if(v===choice&&!correct)b.classList.add('wrong');
  });
  if(correct){
    mtScore.c++;document.getElementById('mtCorrect').textContent=mtScore.c;
    document.getElementById('mtFeedback').innerHTML=`<div class="feedback ok">✓ ${lang==='ru'?'Верно! Размер '+mtEx.timeSig+'/4':'Correct! '+mtEx.timeSig+'/4 meter'}</div>`;
    setTimeout(startMeter,1600);
  } else {
    mtScore.w++;document.getElementById('mtWrong').textContent=mtScore.w;
    document.getElementById('mtFeedback').innerHTML=`<div class="feedback err">✗ ${lang==='ru'?'Ошибка':'Wrong'}: ${lang==='ru'?'правильный размер ':'correct meter '}${mtEx.timeSig}/4</div>`;
    setTimeout(startMeter,2000);
  }
}

function applyLang(){
  const t=UI[lang];
  const set=(id,txt)=>{const e=document.getElementById(id);if(e)e.textContent=txt;};
  set('hdrTitle',t.title);set('hdrSub',t.sub);
  document.querySelectorAll('.gtab').forEach(b=>b.textContent=b.dataset.g+' '+t.grade);
  set('mtab-melodic',t.t1);set('mtab-twovoice',t.t2);set('mtab-rhythm',t.t3);
  set('mtab-errors',t.t4);set('mtab-meter',t.t5);
  ['mCLbl','tvCLbl','rCLbl','eCLbl','mtCLbl'].forEach(id=>set(id,t.correct));
  ['mWLbl','tvWLbl','rWLbl','eWLbl','mtWLbl'].forEach(id=>set(id,t.errors));
  set('mPlayTxt',t.listen);set('tvPlayTxt',t.listen);set('rPlayTxt',t.listen);
  set('ePlayTxt',t.listen);set('mtPlayTxt',t.listen);
  set('mTempoLbl',t.tempo);set('tvTempoLbl',t.tempo);set('rTempoLbl',t.tempo);
  set('mUndoTxt',t.undo);set('mClearTxt',t.clear);set('mHintTxt',t.hint);set('mCheckTxt',t.check);set('mNextTxt',t.next);
  set('tvUndoTxt',t.undo);set('tvClearTxt',t.clear);set('tvHintTxt',t.hint);set('tvCheckTxt',t.check);set('tvNextTxt',t.next);
  set('rUndoTxt',t.undo);set('rClearTxt',t.clear);set('rCheckTxt',t.check);set('rNextTxt',t.next);
  set('eCheckTxt',t.check);set('eNextTxt',t.next);set('mtNextTxt',t.next);
  set('tvVoiceTLbl',t.tVoice);set('tvVoiceBLbl',t.bVoice);
  set('mPlayLabel',t.mpl);set('tvPlayLabel',t.tvpl);
  set('rPlayLabel',t.rpl);set('ePlayLabel',t.epl);set('mtPlayLabel',t.mtpl);
  set('eHintText',t.eHint);
  const dk=isDark();set('themeText',dk?t.light:t.dark);
  // Re-render duration buttons
  const g=getG();
  if(tab==='melodic')renderDurBtns('mDurRow',mDur,g.durs,'setMDur');
  if(tab==='twovoice')renderDurBtns('tvDurRow',tvDur,g.durs,'setTVDur');
  if(tab==='rhythm')renderDurBtns('rDurRow',g.durs,'rTapClick');
}

function toggleLang(){
  lang=lang==='ru'?'en':'ru';
  localStorage.setItem('musicapp_lang',lang);
  document.getElementById('langText').textContent=lang==='ru'?'RU':'EN';
  applyLang();
  refreshTab();
}

function toggleTheme(){
  const dk=isDark();
  document.documentElement.setAttribute('data-theme',dk?'light':'dark');
  localStorage.setItem('musicapp_theme',dk?'light':'dark');
  document.getElementById('themeIco').innerHTML=dk
    ?'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    :'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  applyLang();
  if(tab==='errors'&&eEx)renderErrorStaff();
  if(tab==='melodic'&&mEx)renderStaffArea('mStaffArea',mInput.length?mInput:[],'treble',mEx.timeSig,mEx.key,{userNotes:mInput.length?mInput:undefined});
}

function switchGrade(g){
  grade=g;
  document.querySelectorAll('.gtab').forEach(b=>b.classList.toggle('active',b.dataset.g===g));
  refreshTab();
}

let prevTab=null;
function switchTab(t){
  if(tab===t)return;
  tab=t;
  document.querySelectorAll('.mtab').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
  ['melodic','twovoice','rhythm','errors','meter'].forEach(id=>{
    document.getElementById('tab-'+id).style.display=id===t?'':'none';
  });
  refreshTab();
}

function refreshTab(){
  if(tab==='melodic')startMelodic();
  else if(tab==='twovoice')startTwoVoice();
  else if(tab==='rhythm')startRhythm();
  else if(tab==='errors')startErrors();
  else if(tab==='meter')startMeter();
}

// Tempo display listeners
['mTempo','tvTempo','rTempo','mtTempo'].forEach(id=>{
  const el=document.getElementById(id);
  if(el)el.addEventListener('input',()=>{
    const vid=id.replace('Tempo','TempoVal');
    document.getElementById(vid).textContent=el.value;
  });
});

// Also handle rhythm add-by-duration click in rhythm mode
// The rhythm tab uses dur buttons to add notes (no piano)
// Override renderDurBtns for rhythm tab to add onClick for adding a note
function renderRhythmDurBtns(){
  const el=document.getElementById('rDurRow');if(!el)return;
  el.innerHTML=DUR_INFO.filter(d=>getG().durs.includes(d.dur)).map(d=>
    `<button class="dur-btn${d.dur===rDur?' active':''}" onclick="rDur=${d.dur};this.parentElement.querySelectorAll('.dur-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');" style="width:54px;height:64px;">
      <svg width="20" height="28" viewBox="0 0 20 28">
        ${d.dur>=4?'<ellipse cx="10" cy="16" rx="7" ry="5" fill="none" stroke="currentColor" stroke-width="2" transform="rotate(-15,10,16)"/>':''}
        ${d.dur===2||d.dur===1.5?'<ellipse cx="10" cy="16" rx="7" ry="5" fill="none" stroke="currentColor" stroke-width="2" transform="rotate(-15,10,16)"/><line x1="17" y1="16" x2="17" y2="2" stroke="currentColor" stroke-width="2"/>':''}
        ${d.dur<2&&d.dur>0?'<ellipse cx="10" cy="16" rx="7" ry="5" fill="currentColor" transform="rotate(-15,10,16)"/><line x1="17" y1="16" x2="17" y2="2" stroke="currentColor" stroke-width="2"/>':''}
        ${d.dur===0.5?'<path d="M17,2 C25,5 23,9 17,9" stroke="currentColor" stroke-width="2" fill="none"/>':''}
        ${d.dur===1.5||d.dur===3?'<circle cx="19" cy="16" r="2.5" fill="currentColor"/>':''}
      </svg>
      <span class="dur-lbl">${lang==='ru'?d.labelRu:d.labelEn}</span>
      <span style="font-size:9px;font-weight:800;color:var(--blue)">+</span>
    </button>`
  ).join('');
  // Tap to add note
  el.querySelectorAll('.dur-btn').forEach((btn,i)=>{
    const d=DUR_INFO.filter(x=>getG().durs.includes(x.dur))[i];
    if(d)btn.addEventListener('dblclick',()=>{rDur=d.dur;rAddDur();});
  });
}
