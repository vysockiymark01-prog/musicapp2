<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Муз. Литература</title>
<script>(function(){var t=localStorage.getItem('musicapp_theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else document.documentElement.setAttribute('data-theme','light');})()</script>
<style>
:root{--bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#94a3b8;--border:#e2e8f0;
  --sl100:#f1f5f9;--sl200:#e2e8f0;--blue:#2563eb;--blue2:#1d4ed8;
  --green:#16a34a;--red:#dc2626;--shadow:0 1px 4px rgba(0,0,0,.07);}
[data-theme="dark"]{--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--muted:#64748b;
  --border:#334155;--sl100:#334155;--sl200:#475569;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);transition:background .3s,color .3s;}
.wrap{max-width:960px;margin:0 auto;padding:12px 14px;}
.hdr{display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;background:var(--card);border:1px solid var(--border);
  border-radius:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.hdr-title{font-weight:900;font-size:15px;}
.hdr-sub{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;}
.hdr-btns{display:flex;gap:6px;}
.hbtn{padding:6px 11px;background:var(--sl100);border:none;border-radius:10px;
  font-size:10px;font-weight:800;text-transform:uppercase;cursor:pointer;
  color:var(--text);display:flex;align-items:center;gap:5px;}
.hbtn:hover{background:var(--sl200);}
.tabs{display:flex;gap:6px;margin-bottom:12px;background:var(--card);
  padding:6px;border-radius:14px;border:1px solid var(--border);}
.tab{flex:1;padding:8px;border:none;border-radius:10px;font-size:11px;font-weight:800;
  cursor:pointer;background:none;color:var(--muted);transition:all .15s;}
.tab.active{background:var(--blue);color:#fff;}
.panel{display:none;}
.panel.show{display:block;}
/* FILTER BAR */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.chip{padding:5px 12px;border:1.5px solid var(--border);border-radius:20px;
  background:var(--card);font-size:11px;font-weight:700;cursor:pointer;
  color:var(--muted);transition:all .15s;white-space:nowrap;}
.chip:hover{border-color:var(--blue);color:var(--text);}
.chip.active{background:var(--blue);border-color:var(--blue);color:#fff;}
/* COMPOSER CARDS */
.cards{columns:2;column-gap:12px;}
@media(max-width:560px){.cards{columns:1;}}
.ccard{break-inside:avoid;background:var(--card);border:1px solid var(--border);
  border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);
  cursor:pointer;transition:transform .15s,box-shadow .15s;}
.ccard:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1);}
.ccard.expanded{border-color:var(--blue);}
.comp-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0;}
.comp-name{font-size:14px;font-weight:800;line-height:1.2;}
.comp-meta{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px;}
.era-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;
  font-weight:900;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.era-baroque .era-badge{background:rgba(217,119,6,.15);color:#d97706;}
.era-classicism .era-badge{background:rgba(5,150,105,.15);color:#059669;}
.era-romanticism .era-badge{background:rgba(124,58,237,.15);color:#7c3aed;}
.era-modern .era-badge{background:rgba(8,145,178,.15);color:#0891b2;}
[data-theme="dark"] .era-baroque .era-badge{background:rgba(217,119,6,.25);}
[data-theme="dark"] .era-classicism .era-badge{background:rgba(5,150,105,.25);}
[data-theme="dark"] .era-romanticism .era-badge{background:rgba(124,58,237,.25);}
[data-theme="dark"] .era-modern .era-badge{background:rgba(8,145,178,.25);}
.bio{font-size:12px;line-height:1.6;color:var(--muted);margin-bottom:10px;}
.works-section{display:none;}
.works-section.open{display:block;}
.works-title{font-size:10px;font-weight:900;text-transform:uppercase;color:var(--muted);
  margin-bottom:8px;}
.work{padding:8px 10px;background:var(--sl100);border-radius:10px;margin-bottom:6px;}
.work-name{font-size:12px;font-weight:800;}
.work-meta{font-size:10px;color:var(--muted);margin-top:2px;}
.expand-btn{font-size:10px;font-weight:800;color:var(--blue);cursor:pointer;
  text-transform:uppercase;letter-spacing:.4px;}
/* TIMELINE */
.timeline{position:relative;padding-left:30px;}
.tl-line{position:absolute;left:12px;top:0;bottom:0;width:2px;background:var(--border);}
.tl-item{position:relative;margin-bottom:16px;}
.tl-dot{position:absolute;left:-22px;top:6px;width:12px;height:12px;border-radius:50%;
  border:2px solid var(--card);}
.tl-year{font-size:10px;font-weight:900;color:var(--muted);margin-bottom:2px;}
.tl-name{font-size:13px;font-weight:800;}
.tl-info{font-size:11px;color:var(--muted);margin-top:2px;}
/* QUIZ */
.quiz-wrap{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:22px;box-shadow:var(--shadow);}
.score-row{display:flex;gap:20px;justify-content:center;margin-bottom:16px;}
.sc2{text-align:center;}
.sc2-v{font-size:28px;font-weight:900;}
.sc2-v.g{color:var(--green);}
.sc2-v.r{color:var(--red);}
.sc2-l{font-size:9px;font-weight:900;text-transform:uppercase;color:var(--muted);}
.quiz-q{font-size:14px;font-weight:800;margin-bottom:6px;line-height:1.5;}
.quiz-sub{font-size:11px;color:var(--muted);margin-bottom:14px;font-style:italic;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.qc{padding:10px;border:2px solid var(--border);border-radius:12px;background:var(--card);
  font-size:11px;font-weight:700;cursor:pointer;text-align:center;
  transition:all .15s;color:var(--text);line-height:1.3;}
.qc:hover:not(:disabled){border-color:var(--blue);}
.qc.correct{background:#dcfce7;border-color:var(--green);color:#166534;}
.qc.wrong{background:#fee2e2;border-color:var(--red);color:#991b1b;}
[data-theme="dark"] .qc.correct{background:#166534;color:#bbf7d0;}
[data-theme="dark"] .qc.wrong{background:#7f1d1d;color:#fecaca;}
.quiz-next{width:100%;padding:11px;background:var(--blue);border:none;border-radius:12px;
  color:#fff;font-size:12px;font-weight:900;cursor:pointer;display:none;}
.quiz-next.show{display:block;}
@media(max-width:600px){
  .hdr{flex-wrap:wrap;gap:8px;padding:10px 12px;}
  .hdr-btns{gap:4px;}
  .hbtn{padding:7px 9px;font-size:9px;}
  .wrap{padding:10px;}
  .cards{columns:1;}
  .choices{grid-template-columns:1fr;}
  .tab-bar{overflow-x:auto;-webkit-overflow-scrolling:touch;}
}
@media(max-width:400px){
  .hdr-title{font-size:13px;}
  .comp-name{font-size:13px;}
}
</style>
</head>

     {name:{ru:'Балет «Жар-птица»',en:'"The Firebird"'},year:'1910',genre:{ru:'Балет',en:'Ballet'}},
     {name:{ru:'Балет «Петрушка»',en:'"Petrushka"'},year:'1911',genre:{ru:'Балет',en:'Ballet'}},
   ]},
  {id:'prokofiev',color:'#059669',ini:'СП',era:'modern',origin:'russian',birth:1891,death:1953,
   name:{ru:'Сергей Прокофьев',en:'Sergei Prokofiev'},
   country:{ru:'Россия',en:'Russia'},
   bio:{ru:'Яркий новатор с острым ритмом и неожиданными гармониями. Создатель «Пети и Волка».',
        en:'Innovative composer with sharp rhythms. Creator of "Peter and the Wolf".'},
   works:[
     {name:{ru:'Симфоническая сказка «Петя и Волк»',en:'"Peter and the Wolf"'},year:'1936',genre:{ru:'Оркестровая музыка',en:'Orchestral'}},
     {name:{ru:'Балет «Ромео и Джульетта»',en:'"Romeo and Juliet"'},year:'1935',genre:{ru:'Балет',en:'Ballet'}},
     {name:{ru:'Симфония № 1 «Классическая»',en:'"Classical" Symphony No. 1'},year:'1917',genre:{ru:'Симфония',en:'Symphony'}},
   ]},
  {id:'shostakovich',color:'#d97706',ini:'ДШ',era:'modern',origin:'russian',birth:1906,death:1975,
   name:{ru:'Дмитрий Шостакович',en:'Dmitri Shostakovich'},
   country:{ru:'Россия',en:'Russia'},
   bio:{ru:'Голос трагической эпохи. Симфонии — летопись XX века. Мастер контраста.',
        en:'Voice of a tragic era. Symphonies chronicle the 20th century.'},
   works:[
     {name:{ru:'Симфония № 5',en:'Symphony No. 5'},year:'1937',genre:{ru:'Симфония',en:'Symphony'}},
     {name:{ru:'Симфония № 7 «Ленинградская»',en:'"Leningrad" Symphony No. 7'},year:'1941',genre:{ru:'Симфония',en:'Symphony'}},
     {name:{ru:'Квартет № 8',en:'String Quartet No. 8'},year:'1960',genre:{ru:'Квартет',en:'String Quartet'}},
   ]},
];

const ERA_LABELS={
  baroque:{ru:'Барокко',en:'Baroque'},
  classicism:{ru:'Классицизм',en:'Classicism'},
  romanticism:{ru:'Романтизм',en:'Romanticism'},
  modern:{ru:'XX век',en:'20th Century'}
};
const ERA_COLORS={baroque:'#d97706',classicism:'#059669',romanticism:'#7c3aed',modern:'#0891b2'};

let lang=localStorage.getItem('musicapp_lang')||'ru', eraFilter='all', expandedId=null, quizScore={c:0,w:0}, quizCorrect=null;

/* ─── CARDS ─────────────────────────────────── */
function getFiltered(){
  return COMPOSERS.filter(c=>eraFilter==='all'||c.era===eraFilter);
}

function renderCards(){
  const list=getFiltered();
  const grid=document.getElementById('compCards');
  grid.innerHTML=list.map(c=>{
    const eraLabel=(ERA_LABELS[c.era]||{})[lang];
    const isExp=expandedId===c.id;
    const worksHtml=c.works.map(w=>
      `<div class="work">
        <div class="work-name">${w.name[lang]||w.name.ru}</div>
        <div class="work-meta">${w.year} · ${w.genre[lang]||w.genre.ru}</div>
      </div>`
    ).join('');
    return `<div class="ccard era-${c.era}${isExp?' expanded':''}" onclick="toggleCard('${c.id}')">
      <div class="comp-row">
        <div class="avatar" style="background:${c.color}">${c.ini}</div>
        <div>
          <div class="comp-name">${c.name[lang]||c.name.ru}</div>
          <div class="comp-meta">${c.birth}–${c.death} · ${c.country[lang]||c.country.ru}</div>
        </div>
      </div>
      <span class="era-badge">${eraLabel}</span>
      <div class="bio">${c.bio[lang]||c.bio.ru}</div>
      <div class="works-section${isExp?' open':''}">
        <div class="works-title">${lang==='ru'?'Основные произведения':'Key Works'}</div>
        ${worksHtml}
      </div>
      <div class="expand-btn">${isExp?(lang==='ru'?'▲ Скрыть':'▲ Hide'):(lang==='ru'?'▼ Произведения':'▼ Works')}</div>
    </div>`;
  }).join('');
}

function toggleCard(id){
  expandedId=expandedId===id?null:id;
  renderCards();
}

/* ─── ERA FILTER ────────────────────────────── */
function renderEraFilter(){
  const eras=['all','baroque','classicism','romanticism','modern'];
  const labels={all:{ru:'Все',en:'All'},...ERA_LABELS};
  document.getElementById('eraFilter').innerHTML=eras.map(e=>
    `<button class="chip${eraFilter===e?' active':''}" onclick="setEra('${e}')">${labels[e][lang]||labels[e].ru}</button>`
  ).join('');
}

function setEra(e){
  eraFilter=e;
  renderEraFilter();
  renderCards();
}

/* ─── TIMELINE ──────────────────────────────── */
function renderTimeline(){
  const sorted=[...COMPOSERS].sort((a,b)=>a.birth-b.birth);
  const tl=document.getElementById('timeline');
  tl.innerHTML='<div class="tl-line"></div>'+sorted.map(c=>
    `<div class="tl-item">
      <div class="tl-dot" style="background:${ERA_COLORS[c.era]};left:-22px;"></div>
      <div class="tl-year">${c.birth}–${c.death}</div>
      <div class="tl-name">${c.name[lang]||c.name.ru}</div>
      <div class="tl-info">${c.country[lang]||c.country.ru} · ${(ERA_LABELS[c.era]||{})[lang]}</div>
    </div>`
  ).join('');
}

/* ─── QUIZ ──────────────────────────────────── */
function nextQuiz(){
  document.getElementById('quizNext').classList.remove('show');
  const types=['work_to_comp','comp_to_work','birth_year'];
  const type=types[Math.floor(Math.random()*types.length)];
  const idx=Math.floor(Math.random()*COMPOSERS.length);
  const c=COMPOSERS[idx];
  quizCorrect=null;
  let qText='',qSub='',correct='',wrongPool=[];

  if(type==='work_to_comp'){
    const wi=Math.floor(Math.random()*c.works.length);
    const work=c.works[wi];
    qText=lang==='ru'?'Чьё это произведение?':'Who composed this work?';
    qSub=work.name[lang]||work.name.ru;
    correct=c.name[lang]||c.name.ru;
    wrongPool=COMPOSERS.filter(x=>x.id!==c.id).map(x=>x.name[lang]||x.name.ru);
  } else if(type==='comp_to_work'){
    qText=(lang==='ru'?'Какое произведение написал ':'Which work was composed by ')
      +(c.name[lang]||c.name.ru)+'?';
    qSub='';
    const wi=Math.floor(Math.random()*c.works.length);
    correct=c.works[wi].name[lang]||c.works[wi].name.ru;
    wrongPool=COMPOSERS.filter(x=>x.id!==c.id).flatMap(x=>
      x.works.map(w=>w.name[lang]||w.name.ru)
    ).filter(n=>n!==correct);
  } else {
    qText=(lang==='ru'?'Год рождения ':'Birth year of ')
      +(c.name[lang]||c.name.ru)+'?';
    qSub='';
    correct=String(c.birth);
    wrongPool=COMPOSERS.filter(x=>x.id!==c.id).map(x=>String(x.birth));
  }

  quizCorrect=correct;
  document.getElementById('quizQ').textContent=qText;
  document.getElementById('quizSub').textContent=qSub;

  const wrongs=[...new Set(wrongPool)].sort(()=>Math.random()-.5).slice(0,3);
  const choices=[correct,...wrongs].sort(()=>Math.random()-.5);
  document.getElementById('quizChoices').innerHTML=choices.map(ch=>
    `<button class="qc" onclick="answerQuiz(this,'${esc(ch)}','${esc(correct)}')">${ch}</button>`
  ).join('');
}

function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;')}

function answerQuiz(btn,chosen,correct){
  document.querySelectorAll('#quizChoices .qc').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.classList.add('correct');
    else if(b===btn&&chosen!==correct)b.classList.add('wrong');
  });
  if(chosen===correct){quizScore.c++;}else{quizScore.w++;}
  document.getElementById('qsc').textContent=quizScore.c;
  document.getElementById('qsw').textContent=quizScore.w;
  document.getElementById('quizNext').classList.add('show');
  if(chosen===correct)setTimeout(nextQuiz,1500);
}

/* ─── TABS ──────────────────────────────────── */
function showTab(n){
  for(let i=0;i<3;i++){
    document.getElementById(`tab${i}`).classList.toggle('active',i===n);
    document.getElementById(`panel${i}`).classList.toggle('show',i===n);
  }
  if(n===1)renderTimeline();
  if(n===2&&!document.getElementById('quizQ').textContent)nextQuiz();
}

/* ─── LANG / THEME ──────────────────────────── */
function applyLang(){
  const L=lang==='ru';
  document.getElementById('hdrTitle').textContent=L?'Муз. литература':'Music History';
  document.getElementById('hdrSub').textContent=L?'Композиторы и произведения':'Composers & Works';
  document.getElementById('t0').textContent=L?'Карточки':'Cards';
  document.getElementById('t1').textContent=L?'Хронология':'Timeline';
  document.getElementById('t2').textContent=L?'Викторина':'Quiz';
  document.getElementById('qslC').textContent=L?'Верно':'Correct';
  document.getElementById('qslW').textContent=L?'Ошибки':'Errors';
  document.getElementById('qnTxt').textContent=L?'Следующий →':'Next →';
  const dk=document.documentElement.getAttribute('data-theme')==='dark';
  document.getElementById('themeText').textContent=dk?(L?'Светлая':'Light'):(L?'Тёмная':'Dark');
  renderEraFilter();
  renderCards();
  if(document.getElementById('panel1').classList.contains('show'))renderTimeline();
  if(document.getElementById('quizQ').textContent)nextQuiz();
}

document.getElementById('langBtn').addEventListener('click',()=>{
  lang=lang==='ru'?'en':'ru';
  localStorage.setItem('musicapp_lang',lang);
  document.getElementById('langText').textContent=lang==='ru'?'RU':'EN';
  applyLang();
});
document.getElementById('themeBtn').addEventListener('click',()=>{
  const dk=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',dk?'light':'dark');
  localStorage.setItem('musicapp_theme',dk?'light':'dark');
  const L=lang==='ru';
  document.getElementById('themeText').textContent=dk?(L?'Тёмная':'Dark'):(L?'Светлая':'Light');
  document.getElementById('themeIco').innerHTML=dk
    ?'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    :'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
});

renderEraFilter();
renderCards();
</script>
</body>
